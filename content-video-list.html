<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>پخش ویدیو | GAMva</title>

    <!-- فونت وزیرمتن و آیکون‌ها -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- استایل اصلی پروژه -->
    <link rel="stylesheet" href="assets/style.css">

    <style>
        /* تنظیمات اختصاصی صفحه پخش ویدیو - هماهنگ با تم GAMva */
        .video-player-container {
            max-width: 1300px;
            margin: 1rem auto;
            padding: 0 1rem;
        }

        /* پخش‌کننده ویدیو */
        .video-wrapper {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            overflow: hidden;
            margin-bottom: 2rem;
            transition: var(--transition-base);
        }

        .video-wrapper:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-glow);
        }

        .video-element {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            object-fit: contain;
        }

        /* اطلاعات ویدیو */
        .video-info-section {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }

        .video-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-glass);
            margin-bottom: 1rem;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .channel-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--secondary);
        }

        .channel-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .subscribe-btn {
            background: var(--gradient-primary);
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: var(--radius-full);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .subscribe-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .video-stats {
            display: flex;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: var(--font-sm);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
        }

        .action-video {
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: var(--transition-base);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        .action-video:hover {
            background: var(--gradient-primary);
            color: white;
            transform: translateY(-2px);
        }

        .video-description {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-top: 1rem;
        }

        /* تب‌های مرتبط */
        .tabs-video {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 0.5rem;
        }

        .tab-video-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-full);
            transition: var(--transition-base);
            color: var(--text-muted);
        }

        .tab-video-btn.active {
            background: var(--gradient-primary);
            color: white;
        }

        .tab-video-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-video-content.active {
            display: block;
        }

        /* لیست ویدیوهای مرتبط */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .related-card {
            background: var(--bg-glass-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-base);
            border: 1px solid var(--border-glass);
        }

        .related-card:hover {
            transform: translateY(-4px);
            border-color: var(--secondary);
        }

        .related-thumb {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .related-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .related-card:hover .related-thumb img {
            transform: scale(1.05);
        }

        .related-duration {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.2rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: var(--font-xs);
            color: white;
        }

        .related-info {
            padding: 0.8rem;
        }

        .related-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .related-channel {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        /* نظرات */
        .comments-section {
            margin-top: 1rem;
        }

        .comment-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-glass);
        }

        .comment-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .comment-date {
            font-size: var(--font-xs);
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .comment-text {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .add-comment {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .add-comment input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
        }

        .add-comment input:focus {
            outline: none;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .video-meta {
                flex-direction: column;
                align-items: flex-start;
            }

            .action-buttons {
                width: 100%;
                justify-content: space-between;
            }

            .related-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body data-theme="light">
    <!-- پس‌زمینه بلور متحرک -->
    <div class="dynamic-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- هدر شیشه‌ای یکسان با صفحه اصلی -->
    <header class="glass-header">
        <div class="logo" onclick="window.location.href='main-page.html'">
            <div class="logo-icon"><i class="fas fa-leaf"></i></div>
            <div class="logo-text-container">
                <span class="logo-val">lueva <span class="logo-gam">GAM</span></span>
            </div>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i>
            </button>
            <div class="action-icon" onclick="window.location.href='main-page.html'">
                <i class="fas fa-home"></i>
            </div>
        </div>
    </header>

    <main class="video-player-container" id="videoPlayerRoot">
        <!-- محتوا توسط جاوااسکریپت رندر می‌شود -->
        <div class="video-wrapper fade-up">
            <video id="mainVideo" class="video-element" controls controlsList="nodownload">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
                    type="video/mp4">
            </video>
        </div>
        <div id="videoInfo"></div>
        <div class="tabs-video">
            <button class="tab-video-btn active" data-tab="related">🎬 ویدیوهای مرتبط</button>
            <button class="tab-video-btn" data-tab="comments">💬 نظرات</button>
        </div>
        <div id="relatedTab" class="tab-video-content active"></div>
        <div id="commentsTab" class="tab-video-content"></div>
    </main>

    <!-- فوتر یکسان -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-about">
                    <div class="footer-logo">GAMva</div>
                    <p class="footer-text">اکوسیستم هوشمند سلامت و توسعه فردی با قدرت هوش مصنوعی.</p>
                    <div class="social-links">
                        <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-telegram"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>
                <div>
                    <h3 class="footer-title">ویدیوها</h3>
                    <ul class="footer-links">
                        <li><a href="content-video-list.html"><i class="fas fa-chevron-left"></i> همه ویدیوها</a></li>
                        <li><a href="#"><i class="fas fa-chevron-left"></i> آموزش حرکات</a></li>
                        <li><a href="#"><i class="fas fa-chevron-left"></i> مصاحبه‌ها</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="footer-title">پشتیبانی</h3>
                    <ul class="footer-links">
                        <li><a href="#"><i class="fas fa-chevron-left"></i> تماس با ما</a></li>
                        <li><a href="#"><i class="fas fa-chevron-left"></i> سوالات متداول</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <div>© ۲۰۲۵ GAMva · بهترین ویدیوهای آموزشی ورزشی</div>
            </div>
        </div>
    </footer>

    <!-- ویجت پشتیبانی -->
    <div class="support-widget">
        <a href="telegram_user.html">
            <button class="support-btn"><i class="fas fa-headset"></i><span class="support-tooltip">پشتیبانی
                    ۲۴/۷</span></button>
        </a>
    </div>

    <script src="assets/scripts.js"></script>
    <script>
        (function () {
            // ========== داده‌های ویدیو (مشابه صفحه لیست) ==========
            const videoData = {
                id: 1,
                title: "آموزش کامل حرکت ددلیفت با تکنیک حرفه‌ای",
                channel: "امیرعلی سلیمی",
                channelAvatar: "https://randomuser.me/api/portraits/men/32.jpg",
                thumbnail: "assets/img/stoke/download (1).jpg",
                duration: "24:30",
                views: 12450,
                likes: 3450,
                date: "۱۴۰۳/۱۰/۱۵",
                description: "در این ویدیو، حرکت ددلیفت را از صفر تا صد با تکنیک صحیح و نکات ایمنی آموزش می‌بینید. مناسب برای تمام سطوح از مبتدی تا حرفه‌ای. نکات کلیدی: ۱. وضعیت صحیح ستون فقرات ۲. فاصله مناسب پاها ۳. تکنیک نفس‌گیری ۴. رفع خطاهای رایج",
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
            };

            // ویدیوهای مرتبط
            const relatedVideos = [
                { id: 2, title: "حرکت اسکوات هالتر - نکات کلیدی", channel: "سارا حسینی", thumbnail: "assets/img/stoke/download (2).jpg", duration: "18:45", views: 8900 },
                { id: 3, title: "مصاحبه اختصاصی با قهرمان بدنسازی ایران", channel: "GAMva Sport", thumbnail: "assets/img/stoke/download (3).jpg", duration: "45:00", views: 15600 },
                { id: 4, title: "تکنیک صحیح زیربغل هالتر", channel: "رضا کریمی", thumbnail: "assets/img/stoke/download (4).jpg", duration: "12:20", views: 6700 },
                { id: 5, title: "تمرینات هوازی در خانه", channel: "نرگس تقوی", thumbnail: "assets/img/stoke/download (1).jpg", duration: "20:00", views: 7800 }
            ];

            // نظرات نمونه
            let comments = [
                { author: "علی محمدی", avatar: "ع", date: "۱۴۰۳/۱۰/۱۴", text: "واقعاً عالی بود! ممنون از تیم GAMva", likes: 12 },
                { author: "سارا احمدی", avatar: "س", date: "۱۴۰۳/۱۰/۱۲", text: "لطفاً ادامه بدید. خیلی کمک کننده بود", likes: 8 }
            ];

            let isSubscribed = false;
            let currentLikes = videoData.likes;
            let isLiked = false;

            // رندر اطلاعات ویدیو
            function renderVideoInfo() {
                const container = document.getElementById('videoInfo');
                container.innerHTML = `
                    <div class="video-info-section fade-up">
                        <h1 class="video-title">${videoData.title}</h1>
                        <div class="video-meta">
                            <div class="channel-info">
                                <img src="${videoData.channelAvatar}" class="channel-avatar" alt="">
                                <div>
                                    <div class="channel-name">${videoData.channel}</div>
                                    <div style="font-size: var(--font-xs); color: var(--text-muted);">۱۲٫۴K عضو</div>
                                </div>
                                <button class="subscribe-btn" id="subscribeBtn">${isSubscribed ? 'عضو شده‌اید ✓' : 'عضو شوید'}</button>
                            </div>
                            <div class="video-stats">
                                <span><i class="fas fa-calendar"></i> ${videoData.date}</span>
                                <span><i class="fas fa-eye"></i> ${formatNumber(videoData.views)} بازدید</span>
                            </div>
                            <div class="action-buttons">
                                <button class="action-video" id="likeBtn"><i class="fas fa-heart"></i> <span id="likeCount">${formatNumber(currentLikes)}</span></button>
                                <button class="action-video" id="shareBtn"><i class="fas fa-share-alt"></i> اشتراک</button>
                                <button class="action-video" id="saveBtn"><i class="fas fa-bookmark"></i> ذخیره</button>
                            </div>
                        </div>
                        <div class="video-description">
                            <p>${videoData.description}</p>
                        </div>
                    </div>
                `;

                // رویدادها
                document.getElementById('subscribeBtn').addEventListener('click', () => {
                    isSubscribed = !isSubscribed;
                    const btn = document.getElementById('subscribeBtn');
                    btn.textContent = isSubscribed ? 'عضو شده‌اید ✓' : 'عضو شوید';
                    if (window.showToast) window.showToast(isSubscribed ? '✅ به کانال عضو شدید!' : '❌ عضویت لغو شد', 'info');
                });
                document.getElementById('likeBtn').addEventListener('click', () => {
                    if (!isLiked) {
                        currentLikes++;
                        isLiked = true;
                    } else {
                        currentLikes--;
                        isLiked = false;
                    }
                    document.getElementById('likeCount').innerText = formatNumber(currentLikes);
                    if (window.showToast) window.showToast(isLiked ? '❤️ لایک کردید!' : '💔 لایک برداشته شد', 'info');
                });
                document.getElementById('shareBtn').addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href);
                    if (window.showToast) window.showToast('🔗 لینک ویدیو کپی شد!', 'success');
                });
                document.getElementById('saveBtn').addEventListener('click', () => {
                    if (window.showToast) window.showToast('📌 ویدیو در لیست ذخیره شده‌ها اضافه شد', 'success');
                });
            }

            // رندر ویدیوهای مرتبط
            function renderRelated() {
                const container = document.getElementById('relatedTab');
                container.innerHTML = `
                    <div class="related-grid">
                        ${relatedVideos.map(video => `
                            <div class="related-card" onclick="window.location.href='video-player.html?id=${video.id}'">
                                <div class="related-thumb">
                                    <img src="${video.thumbnail}" alt="${video.title}">
                                    <span class="related-duration">${video.duration}</span>
                                </div>
                                <div class="related-info">
                                    <div class="related-title">${video.title}</div>
                                    <div class="related-channel">${video.channel}</div>
                                    <div class="related-channel" style="font-size: var(--font-xs);">${formatNumber(video.views)} بازدید</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // رندر نظرات
            function renderComments() {
                const container = document.getElementById('commentsTab');
                container.innerHTML = `
                    <div class="comments-section">
                        ${comments.map(comment => `
                            <div class="comment-item">
                                <div class="comment-avatar">${comment.avatar}</div>
                                <div class="comment-content">
                                    <div class="comment-author">${comment.author}</div>
                                    <div class="comment-date">${comment.date}</div>
                                    <div class="comment-text">${comment.text}</div>
                                </div>
                            </div>
                        `).join('')}
                        <div class="add-comment">
                            <input type="text" id="newCommentInput" placeholder="نظر خود را بنویسید...">
                            <button class="action-video" id="submitCommentBtn">ارسال نظر</button>
                        </div>
                    </div>
                `;
                document.getElementById('submitCommentBtn').addEventListener('click', () => {
                    const input = document.getElementById('newCommentInput');
                    const text = input.value.trim();
                    if (text) {
                        comments.push({
                            author: "کاربر GAMva",
                            avatar: "ک",
                            date: new Date().toLocaleDateString('fa-IR'),
                            text: text,
                            likes: 0
                        });
                        renderComments();
                        input.value = '';
                        if (window.showToast) window.showToast('نظر شما ثبت شد!', 'success');
                    }
                });
            }

            function formatNumber(num) {
                if (num >= 10000) return (num / 1000).toFixed(0) + "K";
                if (num >= 1000) return (num / 1000).toFixed(1) + "K";
                return num.toString();
            }

            // تب‌ها
            function setupTabs() {
                const tabs = document.querySelectorAll('.tab-video-btn');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        const tabId = tab.dataset.tab;
                        document.getElementById('relatedTab').classList.toggle('active', tabId === 'related');
                        document.getElementById('commentsTab').classList.toggle('active', tabId === 'comments');
                    });
                });
            }

            // مقداردهی اولیه
            function init() {
                renderVideoInfo();
                renderRelated();
                renderComments();
                setupTabs();

                // ویدیو اصلی را تنظیم کن
                const videoEl = document.getElementById('mainVideo');
                const source = videoEl.querySelector('source');
                source.src = videoData.videoUrl;
                videoEl.load();
            }

            init();

            // افکت fade-up
            const fadeEls = document.querySelectorAll('.fade-up');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) e.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            fadeEls.forEach(el => observer.observe(el));

            // خوشامدگویی
            setTimeout(() => {
                if (window.showToast) {
                    window.showToast('🎬 ویدیو آماده پخش است! کیفیت را تنظیم کنید', 'info', 3000);
                }
            }, 800);
        })();
    </script>
</body>

</html>
