<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسویه حساب | GAMva</title>

    <!-- فونت وزیرمتن و آیکون‌ها -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- استایل اصلی پروژه -->
    <link rel="stylesheet" href="assets/style.css">
    
    <!-- Persian Datepicker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/css/persian-datepicker.min.css">
    <script src="https://cdn.jsdelivr.net/npm/persian-date@1.1.0/dist/persian-date.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/persian-datepicker@1.2.0/dist/js/persian-datepicker.min.js"></script>
    
    <style>
        /* تنظیمات اختصاصی صفحه تسویه حساب */
        .checkout-container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .checkout-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .checkout-header h1 {
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .checkout-wrapper {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
        }
        /* فرم اطلاعات */
        .checkout-form {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
        }
        .form-section {
            margin-bottom: 1.8rem;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-right: 3px solid var(--secondary);
            padding-right: 0.8rem;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            font-size: var(--font-sm);
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: var(--font-sm);
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        /* روش‌های پرداخت */
        .payment-methods {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .payment-option {
            flex: 1;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-base);
        }
        .payment-option.active {
            border-color: var(--primary);
            background: var(--primary-glow);
        }
        .payment-option i {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        /* خلاصه سفارش */
        .order-summary {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            position: sticky;
            top: 100px;
        }
        .summary-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-glass);
        }
        .order-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: var(--font-sm);
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed var(--border-glass);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: var(--font-sm);
        }
        .summary-total {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            border-top: 1px solid var(--border-glass);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }
        .submit-btn {
            width: 100%;
            background: var(--gradient-primary);
            border: none;
            padding: 1rem;
            border-radius: var(--radius-full);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-base);
            margin-top: 1rem;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        @media (max-width: 900px) {
            .checkout-wrapper {
                grid-template-columns: 1fr;
            }
            .order-summary {
                position: static;
            }
        }
        @media (max-width: 550px) {
            .row-2 {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .payment-methods {
                flex-direction: column;
            }
        }
    </style>
</head>
<body data-theme="light">
    <!-- پس‌زمینه بلور متحرک -->
    <div class="dynamic-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- هدر شیشه‌ای -->
    <header class="glass-header">
        <div class="logo" onclick="window.location.href='main-page.html'">
            <div class="logo-icon"><i class="fas fa-leaf"></i></div>
            <div class="logo-text-container">
                <span class="logo-val">lueva <span class="logo-gam">GAM</span></span>
            </div>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i>
            </button>
            <div class="action-icon" onclick="window.location.href='main-page.html'">
                <i class="fas fa-home"></i>
            </div>
        </div>
    </header>

    <main class="checkout-container">
        <div class="checkout-header fade-up">
            <h1>تسویه حساب</h1>
            <p style="color: var(--text-muted);">اطلاعات خود را تکمیل کنید تا سفارش شما ثبت شود</p>
        </div>

        <div class="checkout-wrapper fade-up" id="checkoutContent">
            <!-- محتوا توسط JS رندر می‌شود -->
        </div>
    </main>

    <!-- فوتر -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-about">
                    <div class="footer-logo">GAMva</div>
                    <p class="footer-text">اکوسیستم هوشمند سلامت و توسعه فردی با قدرت هوش مصنوعی.</p>
                    <div class="social-links">
                        <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-telegram"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>
                <div>
                    <h3 class="footer-title">فروشگاه</h3>
                    <ul class="footer-links">
                        <li><a href="coming-soon.html"><i class="fas fa-chevron-left"></i> محصولات</a></li>
                        <li><a href="cart.html"><i class="fas fa-chevron-left"></i> سبد خرید</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="footer-title">پشتیبانی</h3>
                    <ul class="footer-links">
                        <li><a href="#"><i class="fas fa-chevron-left"></i> تماس با ما</a></li>
                        <li><a href="#"><i class="fas fa-chevron-left"></i> سوالات متداول</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <div>© ۲۰۲۵ GAMva · فروشگاه تخصصی محصولات ورزشی و ارگانیک</div>
            </div>
        </div>
    </footer>

    <!-- ویجت پشتیبانی -->
    <div class="support-widget">
        <a href="telegram_user.html">
            <button class="support-btn"><i class="fas fa-headset"></i><span class="support-tooltip">پشتیبانی ۲۴/۷</span></button>
        </a>
    </div>

    <script src="assets/scripts.js"></script>
    <script>
        (function() {
            // ========== دریافت سبد خرید از localStorage ==========
            let cartItems = [];
            function loadCart() {
                const stored = localStorage.getItem('gamva_cart');
                if (stored) {
                    try {
                        cartItems = JSON.parse(stored);
                    } catch(e) {}
                }
                // اگر خالی بود، داده پیش‌فرض برای نمایش (در تسویه اگر خالی باشد به سبد خرید هدایت می‌شود)
                if (!cartItems.length) {
                    // شبیه‌سازی سه محصول برای نمایش (در حالت عادی از سبد می‌آید)
                    cartItems = [
                        { id: 1, name: "پودر پروتئین گیاهی ارگانیک", price: 1260000, quantity: 1, image: "assets/img/stoke/download (1).jpg" },
                        { id: 2, name: "مکمل ویتامین D3 ارگانیک", price: 350000, quantity: 2, image: "assets/img/stoke/download (2).jpg" }
                    ];
                }
            }
            loadCart();

            function formatPrice(price) {
                return price.toLocaleString('fa-IR') + " تومان";
            }

            function calculateTotal() {
                return cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }

            function renderCheckout() {
                const container = document.getElementById('checkoutContent');
                if (!cartItems.length) {
                    // اگر سبد خالی است، به صفحه سبد خرید هدایت شود
                    window.location.href = 'cart.html';
                    return;
                }

                const total = calculateTotal();
                const shippingCost = total > 1000000 ? 0 : 50000;
                const finalTotal = total + shippingCost;

                container.innerHTML = `
                    <div class="checkout-form">
                        <div class="form-section">
                            <div class="section-title"><i class="fas fa-user"></i> اطلاعات شخصی</div>
                            <div class="row-2">
                                <div class="input-group">
                                    <label>نام <span class="required">*</span></label>
                                    <input type="text" id="firstName" placeholder="امیرعلی">
                                </div>
                                <div class="input-group">
                                    <label>نام خانوادگی <span class="required">*</span></label>
                                    <input type="text" id="lastName" placeholder="سلیمی">
                                </div>
                            </div>
                            <div class="row-2">
                                <div class="input-group">
                                    <label>شماره موبایل <span class="required">*</span></label>
                                    <input type="tel" id="phone" placeholder="۰۹۱۲۱۲۳۴۵۶۷">
                                </div>
                                <div class="input-group">
                                    <label>ایمیل</label>
                                    <input type="email" id="email" placeholder="example@email.com">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-title"><i class="fas fa-map-marker-alt"></i> آدرس تحویل سفارش</div>
                            <div class="row-2">
                                <div class="input-group">
                                    <label>استان</label>
                                    <select id="province">
                                        <option value="تهران">تهران</option>
                                        <option value="اصفهان">اصفهان</option>
                                        <option value="مشهد">مشهد</option>
                                        <option value="شیراز">شیراز</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label>شهر</label>
                                    <input type="text" id="city" placeholder="تهران">
                                </div>
                            </div>
                            <div class="input-group">
                                <label>آدرس کامل</label>
                                <textarea id="address" rows="2" placeholder="خیابان، پلاک، واحد"></textarea>
                            </div>
                            <div class="row-2">
                                <div class="input-group">
                                    <label>کد پستی</label>
                                    <input type="text" id="postalCode" placeholder="۱۲۳۴۵۶۷۸۹۰">
                                </div>
                                <div class="input-group">
                                    <label>تاریخ تحویل مورد نظر (اختیاری)</label>
                                    <input type="text" id="deliveryDate" class="persian-date-input" placeholder="۱۴۰۳/۱۲/۱۵">
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-title"><i class="fas fa-credit-card"></i> روش پرداخت</div>
                            <div class="payment-methods">
                                <div class="payment-option active" data-payment="online">
                                    <i class="fas fa-credit-card"></i>
                                    <span>درگاه پرداخت آنلاین</span>
                                </div>
                                <div class="payment-option" data-payment="card">
                                    <i class="fas fa-credit-card"></i>
                                    <span>کارت به کارت</span>
                                </div>
                                <div class="payment-option" data-payment="cod">
                                    <i class="fas fa-truck"></i>
                                    <span>پرداخت در محل</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-title"><i class="fas fa-info-circle"></i> توضیحات اضافی</div>
                            <div class="input-group">
                                <textarea id="notes" rows="2" placeholder="یادداشت یا درخواست خاص (اختیاری)"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="order-summary">
                        <div class="summary-title">خلاصه سفارش</div>
                        <div class="order-items">
                            ${cartItems.map(item => `
                                <div class="order-item">
                                    <span>${item.name} × ${item.quantity}</span>
                                    <span>${formatPrice(item.price * item.quantity)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="summary-row">
                            <span>جمع کل</span>
                            <span>${formatPrice(total)}</span>
                        </div>
                        <div class="summary-row">
                            <span>هزینه ارسال</span>
                            <span>${total > 1000000 ? 'رایگان' : formatPrice(shippingCost)}</span>
                        </div>
                        <div class="summary-row summary-total">
                            <span>مبلغ قابل پرداخت</span>
                            <span>${formatPrice(finalTotal)}</span>
                        </div>
                        <button class="submit-btn" id="submitOrderBtn">ثبت و پرداخت</button>
                    </div>
                `;

                // راه‌اندازی تقویم شمسی
                if (document.getElementById('deliveryDate') && typeof PersianDatepicker !== 'undefined') {
                    new PersianDatepicker(document.getElementById('deliveryDate'), {
                        format: 'YYYY/MM/DD',
                        autoClose: true,
                        calendar: { persian: { locale: 'fa' } }
                    });
                }

                // روش پرداخت
                const paymentOptions = document.querySelectorAll('.payment-option');
                let selectedPayment = 'online';
                paymentOptions.forEach(opt => {
                    opt.addEventListener('click', () => {
                        paymentOptions.forEach(o => o.classList.remove('active'));
                        opt.classList.add('active');
                        selectedPayment = opt.dataset.payment;
                    });
                });

                // ثبت سفارش
                document.getElementById('submitOrderBtn').addEventListener('click', () => {
                    const firstName = document.getElementById('firstName').value.trim();
                    const lastName = document.getElementById('lastName').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    const city = document.getElementById('city').value.trim();
                    const address = document.getElementById('address').value.trim();
                    if (!firstName || !lastName || !phone || !city || !address) {
                        if (window.showToast) window.showToast('لطفاً تمام فیلدهای ضروری را پر کنید', 'warning');
                        else alert('لطفاً اطلاعات کامل را وارد کنید');
                        return;
                    }
                    // شبیه‌سازی ثبت سفارش
                    const orderData = {
                        items: cartItems,
                        total: finalTotal,
                        customer: { firstName, lastName, phone, email: document.getElementById('email').value, city, address, postalCode: document.getElementById('postalCode').value },
                        paymentMethod: selectedPayment,
                        notes: document.getElementById('notes').value,
                        date: new Date().toISOString()
                    };
                    localStorage.setItem('gamva_last_order', JSON.stringify(orderData));
                    // پاک کردن سبد خرید پس از ثبت
                    localStorage.removeItem('gamva_cart');
                    if (window.showToast) {
                        window.showToast('🎉 سفارش شما با موفقیت ثبت شد! در حال انتقال به صفحه پیگیری سفارش...', 'success');
                    }
                    setTimeout(() => {
                        window.location.href = 'order-tracking.html';
                    }, 2000);
                });
            }

            renderCheckout();

            // افکت fade-up
            const fadeEls = document.querySelectorAll('.fade-up');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) e.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            fadeEls.forEach(el => observer.observe(el));
        })();
    </script>
</body>
</html>
