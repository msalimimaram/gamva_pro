<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GAMva Messenger | پیام‌رسان هوشمند</title>

    <!-- فونت وزیرمتن و آیکون‌ها -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- استایل اصلی پروژه (برای هماهنگی با تم GAMva) -->
    <link rel="stylesheet" href="assets/style.css">

    <style>
        /* تنظیمات اختصاصی پیام‌رسان - شیشه‌ای و مدرن */
        :root {
            --msg-primary: #0088cc;
            --msg-primary-light: #5ab9e6;
            --msg-primary-dark: #006699;
            --msg-bg: var(--bg-primary);
            --msg-surface: var(--bg-glass);
            --msg-surface-alt: var(--bg-glass-light);
            --msg-text: var(--text-primary);
            --msg-text-secondary: var(--text-secondary);
            --msg-border: var(--border-glass);
            --msg-online: #40c057;
            --msg-read: #0088cc;
        }
        a{
            text-decoration: none;
        }
        /* ریست کامل برای صفحه چت */
        .messenger-body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Vazirmatn', sans-serif;
        }

        /* کانتینر اصلی دسکتاپ */
        .messenger-desktop {
            display: flex;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
            background: var(--msg-bg);
        }

        /* سایدبار چپ (لیست چت‌ها) */
        .chats-sidebar {
            width: 360px;
            background: var(--msg-surface);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--msg-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* ناحیه اصلی چت */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--msg-bg);
            overflow: hidden;
            position: relative;
        }

        /* سایدبار راست (اطلاعات) */
        .info-sidebar {
            width: 320px;
            background: var(--msg-surface);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--msg-border);
            overflow-y: auto;
            transition: all 0.3s;
        }

        .info-sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
        }

        /* هدر هر بخش */
        .sidebar-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--msg-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-chat {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .profile-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: var(--transition-base);
        }

        .profile-btn:hover {
            transform: scale(1.05);
        }

        /* جستجو */
        .search-box {
            padding: 0.8rem 1rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--msg-border);
            background: var(--msg-surface-alt);
            color: var(--msg-text);
            font-family: 'Vazirmatn', sans-serif;
            font-size: var(--font-sm);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* فیلتر تب‌ها */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--msg-border);
        }

        .filter-tab {
            padding: 0.3rem 1rem;
            border-radius: var(--radius-full);
            background: transparent;
            border: none;
            color: var(--msg-text-secondary);
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .filter-tab.active {
            background: var(--gradient-primary);
            color: white;
        }

        /* لیست چت‌ها */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--msg-border);
        }

        .chat-row:hover,
        .chat-row.active {
            background: var(--msg-surface-alt);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.2rem;
        }

        .chat-name {
            font-weight: 700;
            font-size: var(--font-base);
        }

        .chat-time {
            font-size: var(--font-xs);
            color: var(--msg-text-secondary);
        }

        .chat-last-msg {
            font-size: var(--font-sm);
            color: var(--msg-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: var(--primary);
            color: white;
            font-size: var(--font-xs);
            padding: 0.2rem 0.5rem;
            border-radius: var(--radius-full);
            min-width: 22px;
            text-align: center;
        }

        /* هدر چت اصلی */
        .chat-header {
            background: var(--msg-surface);
            backdrop-filter: blur(20px);
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--msg-border);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-avatar-sm {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-title-sm {
            font-weight: 700;
            font-size: 1rem;
        }

        .chat-status-sm {
            font-size: var(--font-xs);
            color: var(--msg-text-secondary);
        }

        .chat-actions {
            display: flex;
            gap: 1.2rem;
        }

        .action-icon-chat {
            font-size: 1.2rem;
            color: var(--msg-text-secondary);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .action-icon-chat:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        /* ناحیه پیام‌ها */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-item {
            display: flex;
            max-width: 75%;
        }

        .message-item.received {
            align-self: flex-start;
        }

        .message-item.sent {
            align-self: flex-end;
        }

        .message-bubble {
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            position: relative;
        }

        .received .message-bubble {
            background: var(--msg-surface);
            border: 1px solid var(--msg-border);
            border-bottom-right-radius: 0.3rem;
        }

        .sent .message-bubble {
            background: var(--gradient-primary);
            color: white;
            border-bottom-left-radius: 0.3rem;
        }

        .message-text {
            font-size: var(--font-sm);
            line-height: 1.4;
            word-break: break-word;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.3rem;
            margin-top: 0.2rem;
            font-size: var(--font-xs);
            opacity: 0.7;
        }

        /* ورودی پیام */
        .input-area {
            background: var(--msg-surface);
            backdrop-filter: blur(20px);
            padding: 0.8rem 1rem;
            border-top: 1px solid var(--msg-border);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .attach-group {
            display: flex;
            gap: 0.8rem;
        }

        .attach-icon {
            font-size: 1.3rem;
            color: var(--msg-text-secondary);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .attach-icon:hover {
            color: var(--primary);
        }

        .message-input {
            flex: 1;
            background: var(--msg-surface-alt);
            border: 1px solid var(--msg-border);
            border-radius: var(--radius-full);
            padding: 0.6rem 1rem;
            color: var(--msg-text);
            font-family: 'Vazirmatn', sans-serif;
            font-size: var(--font-sm);
            resize: none;
            outline: none;
        }

        .send-icon {
            font-size: 1.3rem;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .send-icon:hover {
            transform: scale(1.1);
        }

        /* سایدبار اطلاعات */
        .info-content {
            padding: 1rem;
        }

        .profile-detail {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .profile-avatar-lg {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 0.8rem;
            border: 2px solid var(--secondary);
        }

        .info-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .info-action {
            background: var(--msg-surface-alt);
            border-radius: var(--radius-lg);
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-base);
        }

        .info-action:hover {
            background: var(--gradient-primary);
            color: white;
            transform: translateY(-2px);
        }

        /* درخواست‌ها */
        .requests-section {
            border-top: 1px solid var(--msg-border);
            padding: 0.8rem 1rem;
        }

        /* حالت موبایل */
        @media (max-width: 768px) {
            .messenger-desktop {
                display: none;
            }

            .mobile-container {
                display: flex;
                flex-direction: column;
                height: 100vh;
                background: var(--msg-bg);
            }

            .mobile-sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                background: var(--msg-surface);
                backdrop-filter: blur(25px);
                z-index: 200;
                transform: translateX(100%);
                transition: transform 0.3s;
                display: flex;
                flex-direction: column;
            }

            .mobile-sidebar.open {
                transform: translateX(0);
            }

            .mobile-info {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                background: var(--msg-surface);
                backdrop-filter: blur(25px);
                z-index: 200;
                transform: translateX(-100%);
                transition: transform 0.3s;
                overflow-y: auto;
            }

            .mobile-info.open {
                transform: translateX(0);
            }

            .mobile-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 150;
                display: none;
            }

            .mobile-overlay.show {
                display: block;
            }
        }

        .mobile-container {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            .mobile-container {
                display: flex;
            }
        }
    </style>
</head>

<body class="messenger-body" data-theme="light">
    <!-- ========== نسخه دسکتاپ ========== -->
    <div class="messenger-desktop">
        <!-- سایدبار چپ -->
        <div class="chats-sidebar">
            <div class="sidebar-header">
                <a href="main-page.html"><div class="logo-chat">GAMva Chat</div></a>
                <div class="profile-btn" id="desktopProfileBtn"><i class="fas fa-user"></i></div>
            </div>
            <div class="search-box">
                <input type="text" id="desktopSearch" placeholder="جستجوی چت‌ها...">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">همه</button>
                <button class="filter-tab" data-filter="personal">شخصی</button>
                <button class="filter-tab" data-filter="group">گروه</button>
            </div>
            <div class="chats-list" id="desktopChatsList"></div>
            <div class="requests-section" id="desktopRequests"></div>
        </div>

        <!-- ناحیه چت اصلی -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-header-left">
                    <img src="" class="chat-avatar-sm" id="desktopChatAvatar">
                    <div>
                        <div class="chat-title-sm" id="desktopChatTitle">...</div>
                        <div class="chat-status-sm" id="desktopChatStatus"></div>
                    </div>
                </div>
                <div class="chat-actions">
                    <i class="fas fa-phone-alt action-icon-chat" id="desktopCall"></i>
                    <i class="fas fa-video action-icon-chat" id="desktopVideo"></i>
                    <i class="fas fa-info-circle action-icon-chat" id="desktopInfoBtn"></i>
                </div>
            </div>
            <div class="messages-area" id="desktopMessages"></div>
            <div class="input-area">
                <div class="attach-group">
                    <i class="fas fa-paperclip attach-icon" id="desktopAttach"></i>
                    <i class="fas fa-image attach-icon" id="desktopImage"></i>
                </div>
                <textarea class="message-input" rows="1" id="desktopInput"
                    placeholder="پیام خود را بنویسید..."></textarea>
                <i class="fas fa-paper-plane send-icon" id="desktopSend"></i>
            </div>
        </div>

        <!-- سایدبار راست اطلاعات -->
        <div class="info-sidebar" id="desktopInfoSidebar">
            <div class="sidebar-header">
                <div class="logo-chat">اطلاعات</div>

            </div>
            <div class="info-content" id="desktopInfoContent"></div>
        </div>
    </div>

    <!-- ========== نسخه موبایل ========== -->
    <div class="mobile-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <i class="fas fa-bars action-icon-chat" id="mobileMenuBtn" style="margin-left: 0.5rem;"></i>
                <img src="" class="chat-avatar-sm" id="mobileChatAvatar">
                <div>
                    <div class="chat-title-sm" id="mobileChatTitle">...</div>
                    <div class="chat-status-sm" id="mobileChatStatus"></div>
                </div>
            </div>
            <div class="chat-actions">
                <i class="fas fa-phone-alt action-icon-chat" id="mobileCall"></i>
                <i class="fas fa-info-circle action-icon-chat" id="mobileInfoBtn"></i>
            </div>
        </div>
        <div class="messages-area" id="mobileMessages"></div>
        <div class="input-area">
            <div class="attach-group">
                <i class="fas fa-paperclip attach-icon" id="mobileAttach"></i>
                <i class="fas fa-image attach-icon" id="mobileImage"></i>
            </div>
            <textarea class="message-input" rows="1" id="mobileInput" placeholder="پیام..."></textarea>
            <i class="fas fa-paper-plane send-icon" id="mobileSend"></i>
        </div>
    </div>

    <!-- سایدبار چپ موبایل -->
    <div class="mobile-sidebar" id="mobileSidebar">
        <div class="sidebar-header">
            <a href="main-page.html">
                <div class="logo-chat">GAMva Chat</div>
            </a>
            <div class="profile-btn" id="mobileProfileBtn"><i class="fas fa-user"></i></div>
        </div>
        <div class="search-box">
            <input type="text" id="mobileSearch" placeholder="جستجو...">
        </div>
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">همه</button>
            <button class="filter-tab" data-filter="personal">شخصی</button>
            <button class="filter-tab" data-filter="group">گروه</button>
        </div>
        <div class="chats-list" id="mobileChatsList"></div>
        <div class="requests-section" id="mobileRequests"></div>
    </div>

    <!-- سایدبار راست موبایل -->
    <div class="mobile-info" id="mobileInfoSidebar">
        <div class="sidebar-header">
            <div class="logo-chat">اطلاعات</div>
            <i class="fas fa-times action-icon-chat" id="mobileCloseInfo"></i>
        </div>
        <div class="info-content" id="mobileInfoContent"></div>
    </div>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <script src="assets/scripts.js"></script>
    <script>
        (function () {
            // ========== داده‌های نمونه (هماهنگ با برند سلامت) ==========
            const chatsData = [
                { id: 1, name: "دکتر امیر محمدی", type: "personal", avatar: "assets/img/stoke/download (1).jpg", lastMsg: "جلسه تمرین فردا ساعت ۴", time: "۱۲:۴۵", unread: 2, online: true, bio: "متخصص تغذیه ورزشی | بیش از ۱۰ سال سابقه", role: "مربی تغذیه" },
                { id: 2, name: "مهسا رضایی", type: "personal", avatar: "assets/img/stoke/download (2).jpg", lastMsg: "برنامه تمرینی جدید رو برات فرستادم", time: "دیروز", unread: 0, online: false, bio: "کوچ توسعه فردی و عادت‌سازی", role: "مربی توسعه فردی" },
                { id: 3, name: "تیم GAMva", type: "group", avatar: "assets/img/stoke/download (3).jpg", lastMsg: "محمد: جلسه هماهنگی ساعت ۱۰", time: "دیروز", unread: 5, online: true, bio: "گروه رسمی GAMva | ۱۲ عضو", role: "گروه پشتیبانی" },
                { id: 4, name: "دکتر سارا احمدی", type: "personal", avatar: "assets/img/stoke/download (4).jpg", lastMsg: "نتیجه تست‌ها رو دریافت کردم", time: "سه‌شنبه", unread: 0, online: false, bio: "روانشناس بالینی ورزشی", role: "روانشناس" }
            ];

            // پیام‌های نمونه
            let messagesDB = {
                1: [
                    { text: "سلام! جلسه تمرین فردا ساعت ۴ هست.", sender: "received", time: "۱۲:۴۵", status: "read" },
                    { text: "باشه ممنون. آماده هستم.", sender: "sent", time: "۱۲:۴۷", status: "read" },
                    { text: "رژیم غذایی این هفته رو هم برات ارسال می‌کنم.", sender: "received", time: "۱۲:۵۰", status: "read" }
                ],
                2: [
                    { text: "برنامه تمرینی جدید رو برات فرستادم.", sender: "received", time: "دیروز", status: "read" },
                    { text: "خیلی ممنون. عالیه!", sender: "sent", time: "دیروز", status: "read" }
                ],
                3: [
                    { text: "جلسه هماهنگی فردا ساعت ۱۰ صبح.", sender: "received", time: "دیروز", status: "read" },
                    { text: "حاضر.", sender: "sent", time: "دیروز", status: "read" }
                ],
                4: [
                    { text: "نتیجه تست‌ها رو دریافت کردم. جلسه بعد با هم بررسی می‌کنیم.", sender: "received", time: "سه‌شنبه", status: "read" }
                ]
            };

            // درخواست‌های دوستی
            let requestsData = [
                { id: 1, name: "رضا کریمی", avatar: "assets/img/stoke/download (1).jpg", bio: "مربی بدنسازی" },
                { id: 2, name: "نرگس تقوی", avatar: "assets/img/stoke/download (2).jpg", bio: "مربی یوگا" }
            ];

            let currentChatId = 1;
            let currentFilter = "all";
            let searchQuery = "";

            // ========== توابع رندر ==========
            function getFilteredChats() {
                let filtered = [...chatsData];
                if (currentFilter !== "all") {
                    filtered = filtered.filter(c => c.type === currentFilter);
                }
                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(c => c.name.toLowerCase().includes(q));
                }
                return filtered;
            }

            function renderChatsList(containerId, isDesktop = true) {
                const filtered = getFilteredChats();
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = filtered.map(chat => `
                    <div class="chat-row ${currentChatId === chat.id ? 'active' : ''}" data-chat-id="${chat.id}">
                        <img src="${chat.avatar}" class="chat-avatar" alt="${chat.name}">
                        <div class="chat-info">
                            <div class="chat-name-row">
                                <span class="chat-name">${chat.name}</span>
                                <span class="chat-time">${chat.time}</span>
                            </div>
                            <div class="chat-last-msg">${chat.lastMsg}</div>
                        </div>
                        ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                    </div>
                `).join('');
                // رویداد کلیک
                document.querySelectorAll(`#${containerId} .chat-row`).forEach(row => {
                    row.addEventListener('click', () => {
                        const newId = parseInt(row.dataset.chatId);
                        if (newId !== currentChatId) {
                            currentChatId = newId;
                            // به‌روزرسانی همه بخش‌ها
                            renderChatsList('desktopChatsList', true);
                            renderChatsList('mobileChatsList', false);
                            renderMessages('desktopMessages');
                            renderMessages('mobileMessages');
                            renderInfoSidebar('desktopInfoContent');
                            renderInfoSidebar('mobileInfoContent');
                            updateChatHeader();
                            // بستن سایدبار موبایل
                            if (window.innerWidth <= 768) {
                                document.getElementById('mobileSidebar')?.classList.remove('open');
                                document.getElementById('mobileOverlay')?.classList.remove('show');
                            }
                        }
                    });
                });
            }

            function renderMessages(containerId) {
                const msgs = messagesDB[currentChatId] || [];
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = msgs.map(msg => `
                    <div class="message-item ${msg.sender}">
                        <div class="message-bubble">
                            <div class="message-text">${msg.text}</div>
                            <div class="message-footer">
                                <span>${msg.time}</span>
                                ${msg.sender === 'sent' ? `<span><i class="fas ${msg.status === 'read' ? 'fa-check-double' : 'fa-check'}"></i></span>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
                setTimeout(() => {
                    if (container) container.scrollTop = container.scrollHeight;
                }, 100);
            }

            function renderInfoSidebar(containerId) {
                const chat = chatsData.find(c => c.id === currentChatId);
                if (!chat) return;
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = `
                    <div class="profile-detail">
                        <img src="${chat.avatar}" class="profile-avatar-lg">
                        <div style="font-weight:700; font-size:1.2rem;">${chat.name}</div>
                        <div style="font-size:var(--font-sm); color:var(--text-muted);">${chat.role || ''}</div>
                        <div style="font-size:var(--font-xs); margin-top:0.3rem;">${chat.bio}</div>
                    </div>
                    <div class="info-actions">
                        <div class="info-action" data-action="mute"><i class="fas fa-bell-slash"></i><div>بی‌صدا</div></div>
                        <div class="info-action" data-action="pin"><i class="fas fa-thumbtack"></i><div>پین</div></div>
                        <div class="info-action" data-action="clear"><i class="fas fa-trash-alt"></i><div>پاک کردن</div></div>
                        <div class="info-action" data-action="block"><i class="fas fa-ban"></i><div>بلاک</div></div>
                    </div>
                `;
                // رویدادهای اکشن
                document.querySelectorAll(`#${containerId} .info-action`).forEach(el => {
                    el.addEventListener('click', () => {
                        if (window.showToast) window.showToast(`عملیات ${el.querySelector('div')?.innerText} انجام شد`, 'info');
                        else alert(`عملیات ${el.querySelector('div')?.innerText} انجام شد`);
                    });
                });
            }

            function renderRequests(containerId, isDesktop = true) {
                const container = document.getElementById(containerId);
                if (!container) return;
                if (requestsData.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                container.innerHTML = `
                    <div style="font-size:0.8rem; color:var(--error); margin-bottom:0.5rem;">درخواست‌های جدید</div>
                    ${requestsData.map(req => `
                        <div class="chat-row" style="padding:0.5rem 0;" data-req="${req.id}">
                            <img src="${req.avatar}" class="chat-avatar" style="width:40px; height:40px;">
                            <div class="chat-info">
                                <div class="chat-name">${req.name}</div>
                                <div class="chat-last-msg">${req.bio}</div>
                            </div>
                            <div style="display:flex; gap:0.5rem;">
                                <button class="accept-req" style="background:var(--success); border:none; width:32px; height:32px; border-radius:50%; color:white;"><i class="fas fa-check"></i></button>
                                <button class="decline-req" style="background:var(--surface-alt); border:none; width:32px; height:32px; border-radius:50%;"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                    `).join('')}
                `;
                document.querySelectorAll(`#${containerId} .accept-req`).forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const row = btn.closest('[data-req]');
                        const id = parseInt(row?.dataset.req);
                        if (id) {
                            requestsData = requestsData.filter(r => r.id !== id);
                            renderRequests('desktopRequests', true);
                            renderRequests('mobileRequests', false);
                            if (window.showToast) window.showToast('درخواست پذیرفته شد', 'success');
                        }
                    });
                });
                document.querySelectorAll(`#${containerId} .decline-req`).forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const row = btn.closest('[data-req]');
                        const id = parseInt(row?.dataset.req);
                        if (id) {
                            requestsData = requestsData.filter(r => r.id !== id);
                            renderRequests('desktopRequests', true);
                            renderRequests('mobileRequests', false);
                            if (window.showToast) window.showToast('درخواست رد شد', 'info');
                        }
                    });
                });
            }

            function updateChatHeader() {
                const chat = chatsData.find(c => c.id === currentChatId);
                if (!chat) return;
                const statusText = chat.online ? '<span style="color:var(--success)">●</span> آنلاین' : 'آفلاین';
                document.getElementById('desktopChatTitle').innerText = chat.name;
                document.getElementById('desktopChatStatus').innerHTML = statusText;
                document.getElementById('desktopChatAvatar').src = chat.avatar;
                document.getElementById('mobileChatTitle').innerText = chat.name;
                document.getElementById('mobileChatStatus').innerHTML = statusText;
                document.getElementById('mobileChatAvatar').src = chat.avatar;
            }

            // ارسال پیام
            function sendMessage(isDesktop = true) {
                const input = document.getElementById(isDesktop ? 'desktopInput' : 'mobileInput');
                const text = input.value.trim();
                if (!text) return;
                const now = new Date();
                const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                const newMsg = { text: text, sender: "sent", time: time, status: "sent" };
                if (!messagesDB[currentChatId]) messagesDB[currentChatId] = [];
                messagesDB[currentChatId].push(newMsg);
                renderMessages('desktopMessages');
                renderMessages('mobileMessages');
                input.value = '';
                // شبیه‌سازی خوانده شدن و پاسخ
                setTimeout(() => {
                    const lastMsg = messagesDB[currentChatId].findLast(m => m.sender === 'sent');
                    if (lastMsg) lastMsg.status = 'read';
                    renderMessages('desktopMessages');
                    renderMessages('mobileMessages');
                }, 500);
                setTimeout(() => {
                    const reply = { text: "پیام شما دریافت شد. در اسرع وقت پاسخ می‌دهم.", sender: "received", time: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }), status: "read" };
                    messagesDB[currentChatId].push(reply);
                    renderMessages('desktopMessages');
                    renderMessages('mobileMessages');
                }, 1500);
            }

            // ========== رویدادها ==========
            function initEventListeners() {
                // فیلترها
                document.querySelectorAll('.filter-tab').forEach(tab => {
                    tab.addEventListener('click', function () {
                        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        currentFilter = this.dataset.filter;
                        renderChatsList('desktopChatsList', true);
                        renderChatsList('mobileChatsList', false);
                    });
                });
                // جستجو
                const desktopSearch = document.getElementById('desktopSearch');
                const mobileSearch = document.getElementById('mobileSearch');
                if (desktopSearch) {
                    desktopSearch.addEventListener('input', (e) => {
                        searchQuery = e.target.value;
                        renderChatsList('desktopChatsList', true);
                    });
                }
                if (mobileSearch) {
                    mobileSearch.addEventListener('input', (e) => {
                        searchQuery = e.target.value;
                        renderChatsList('mobileChatsList', false);
                    });
                }
                // ارسال
                document.getElementById('desktopSend').addEventListener('click', () => sendMessage(true));
                document.getElementById('mobileSend').addEventListener('click', () => sendMessage(false));
                document.getElementById('desktopInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(true); }
                });
                document.getElementById('mobileInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(false); }
                });
                // تماس و ویدیو
                document.getElementById('desktopCall').addEventListener('click', () => alert('شروع تماس صوتی...'));
                document.getElementById('desktopVideo').addEventListener('click', () => alert('شروع تماس تصویری...'));
                document.getElementById('mobileCall').addEventListener('click', () => alert('شروع تماس صوتی...'));
                // پیوست
                document.getElementById('desktopAttach').addEventListener('click', () => alert('ارسال فایل'));
                document.getElementById('desktopImage').addEventListener('click', () => alert('ارسال تصویر'));
                document.getElementById('mobileAttach').addEventListener('click', () => alert('ارسال فایل'));
                document.getElementById('mobileImage').addEventListener('click', () => alert('ارسال تصویر'));
                // سایدبار راست
                document.getElementById('desktopInfoBtn').addEventListener('click', () => {
                    document.getElementById('desktopInfoSidebar').classList.remove('collapsed');
                });
                document.getElementById('desktopCloseInfo').addEventListener('click', () => {
                    document.getElementById('desktopInfoSidebar').classList.add('collapsed');
                });
                document.getElementById('mobileInfoBtn').addEventListener('click', () => {
                    document.getElementById('mobileInfoSidebar').classList.add('open');
                    document.getElementById('mobileOverlay').classList.add('show');
                });
                document.getElementById('mobileCloseInfo').addEventListener('click', () => {
                    document.getElementById('mobileInfoSidebar').classList.remove('open');
                    document.getElementById('mobileOverlay').classList.remove('show');
                });
                // سایدبار چپ موبایل
                document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                    document.getElementById('mobileSidebar').classList.add('open');
                    document.getElementById('mobileOverlay').classList.add('show');
                });
                document.getElementById('mobileOverlay').addEventListener('click', () => {
                    document.getElementById('mobileSidebar').classList.remove('open');
                    document.getElementById('mobileInfoSidebar').classList.remove('open');
                    document.getElementById('mobileOverlay').classList.remove('show');
                });
                // پروفایل
                document.getElementById('desktopProfileBtn').addEventListener('click', () => alert('پروفایل شما'));
                document.getElementById('mobileProfileBtn').addEventListener('click', () => alert('پروفایل شما'));
            }

            // مقداردهی اولیه
            function init() {
                renderChatsList('desktopChatsList', true);
                renderChatsList('mobileChatsList', false);
                renderMessages('desktopMessages');
                renderMessages('mobileMessages');
                renderInfoSidebar('desktopInfoContent');
                renderInfoSidebar('mobileInfoContent');
                renderRequests('desktopRequests', true);
                renderRequests('mobileRequests', false);
                updateChatHeader();
                initEventListeners();
                // هماهنگی با دکمه تم سایت
                const themeToggle = document.getElementById('themeToggle');
                if (themeToggle) {
                    // اگر اسکریپت اصلی تم را مدیریت می‌کند، نیازی نیست
                }
                // خوشامدگویی
                setTimeout(() => {
                    if (window.showToast) window.showToast('💬 به پیام‌رسان GAMva خوش آمدید!', 'info', 3000);
                }, 800);
            }
            init();
        })();
    </script>
</body>

</html>
