<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>محاسبه‌گر پیشرفته ترکیب بدن | Fitness Tools Pro</title>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            position: relative;
            background: transparent;
        }

        /* ===== پس‌زمینه ثابت با بلر حرفه‌ای ===== */
        .global-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .global-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(5px);
            transform: scale(1.05);
        }

        .global-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.45) 0%, rgba(0, 0, 0, 0.3) 100%);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(78, 205, 196, 0.5);
            border-radius: 10px;
        }

        .container {
            max-width: 1450px;
            margin: 0 auto;
            padding: 30px 24px 60px;
            position: relative;
            z-index: 2;
        }

        /* دکمه برگشت به صفحه اصلی */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 25px;
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(-4px);
            border-color: rgba(78, 205, 196, 0.6);
        }

        /* دکمه بازگشت به لیست (در حالت تک ابزار) */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 25px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(-5px);
            border-color: rgba(78, 205, 196, 0.6);
        }

        /* هدر شیشه‌ای */
        .hero-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 28px 38px;
            margin-bottom: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .hero-glass h1 {
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(125deg, #FFFFFF, #D4E6F1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-glass p {
            color: rgba(255,255,255,0.85);
            margin-top: 10px;
        }

        /* شبکه ابزارها */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 32px;
            margin-bottom: 30px;
        }

        /* ===== کارت با افکت hover ===== */
        .tool-card {
            position: relative;
            background: rgba(25, 35, 50, 0.6);
            backdrop-filter: blur(14px);
            border-radius: 44px;
            padding: 26px;
            transition: all 0.35s ease;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
            animation: fadeInUp 0.5s ease backwards;
        }

        /* باکس شدو گرادیانت نورانی در هاور - بدون تغییر رنگ کارت */
        .tool-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2),
                        0 0 0 5px rgba(78, 205, 196, 0.1),
                        0 20px 35px rgba(0, 0, 0, 0.25);
            border-color: rgba(78, 205, 196, 0.4);
        }

        /* افکت نورانی اضافی روی حاشیه */
        .tool-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, 
                rgba(78, 205, 196, 0.3), 
                rgba(255, 107, 107, 0.2),
                rgba(78, 205, 196, 0.3));
            border-radius: 45px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .tool-card:hover::after {
            opacity: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tool-card:nth-child(1) { animation-delay: 0.05s; }
        .tool-card:nth-child(2) { animation-delay: 0.1s; }
        .tool-card:nth-child(3) { animation-delay: 0.15s; }
        .tool-card:nth-child(4) { animation-delay: 0.2s; }
        .tool-card:nth-child(5) { animation-delay: 0.25s; }
        .tool-card:nth-child(6) { animation-delay: 0.3s; }
        .tool-card:nth-child(7) { animation-delay: 0.35s; }

        .tool-title {
            font-size: 1.55rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            border-right: 4px solid #4ecdc4;
            padding-right: 16px;
            color: white;
        }

        .tool-title i {
            color: #4ecdc4;
            font-size: 1.7rem;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 0.3px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.92);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
            outline: none;
        }

        .input-group input:focus, .input-group select:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(78,205,196,0.3);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px 18px;
            margin: 20px 0 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .result-value {
            font-size: 2.3rem;
            font-weight: 800;
            color: #4ecdc4;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
        }

        .chart-container {
            margin-top: 18px;
            height: 120px;
            display: flex;
            justify-content: center;
        }

        canvas.small-canvas {
            max-width: 130px;
            max-height: 120px;
        }

        /* بخش اطلاعات بصری پایین کارت */
        .info-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .info-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .visual-range {
            background: rgba(0,0,0,0.35);
            border-radius: 40px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin: 10px 0;
        }

        .visual-fill {
            height: 100%;
            border-radius: 40px;
            transition: width 0.3s ease;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
            margin-top: 6px;
        }

        .advice-text {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.75);
            margin-top: 12px;
            line-height: 1.5;
            background: rgba(78,205,196,0.1);
            padding: 10px 12px;
            border-radius: 20px;
        }

        .info-note {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.55);
            margin-top: 14px;
            text-align: center;
        }

        /* حالت تک ابزار */
        .single-tool-wrapper {
            max-width: 650px;
            margin: 0 auto;
        }

        @media (max-width: 850px) {
            .tools-grid { grid-template-columns: 1fr; }
            .hero-glass h1 { font-size: 1.5rem; }
            .hero-glass { padding: 20px 24px; }
            .tool-title { font-size: 1.35rem; }
            .home-btn, .back-btn { margin-bottom: 18px; }
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="global-bg">
        <img src="assets/img/skate-park-with-ramps-in-tropical-city.jpg" alt="اسکیت پارک در شهر گرمسیری | پس زمینه ورزشی">
    </div>
    <div class="global-overlay"></div>

    <div class="container" id="appRoot"></div>
    <footer>✨ محاسبات دقیق بر اساس جدیدترین معادلات علمی | Fitness Tools Pro</footer>

    <script>
        // ---------- کتابخانه ابزارها با اطلاعات بصری ----------
        const toolsData = {
            bmi: {
                name: "شاخص توده بدنی (BMI)",
                icon: "fas fa-calculator",
                unit: "kg/m²",
                inputs: [
                    { label: "قد (سانتی‌متر)", type: "number", id: "height_cm", default: 175, step: 1, min: 100, max: 250 },
                    { label: "وزن (کیلوگرم)", type: "number", id: "weight_kg", default: 70, step: 0.5, min: 30, max: 200 }
                ],
                calculate: (vals) => {
                    let h = vals.height_cm / 100;
                    let bmi = vals.weight_kg / (h * h);
                    let status = "";
                    let range = "";
                    if (bmi < 18.5) { status = "کمبود وزن 🍃"; range = "low"; }
                    else if (bmi < 25) { status = "وزن طبیعی ✅"; range = "normal"; }
                    else if (bmi < 30) { status = "اضافه وزن ⚠️"; range = "over"; }
                    else { status = "چاقی ❗"; range = "obese"; }
                    return { value: bmi.toFixed(1), status, range };
                },
                info: "شاخص ساده برای ارزیابی وزن نسبت به قد. محدوده سالم: 18.5 تا 24.9",
                ranges: { min: 12, max: 40, normalMin: 18.5, normalMax: 25 },
                advice: {
                    low: "وزن شما低于 محدوده سالم. توصیه می‌شود با مشاور تغذیه، برنامه افزایش وزن اصولی داشته باشید.",
                    normal: "وزن شما در محدوده ایده‌آل است. با حفظ فعالیت بدنی و تغذیه متعادل، سلامت خود را تداوم بخشید.",
                    over: "اضافه وزن خفیف. با افزایش فعالیت روزانه و کاهش کالری دریافتی می‌توانید به وزن ایده‌آل برسید.",
                    obese: "چاقی نیازمند توجه جدی. شروع فعالیت زیر نظر مربی و اصلاح رژیم غذایی توصیه می‌شود."
                }
            },
            bodyfat: {
                name: "درصد چربی بدن",
                icon: "fas fa-chart-line",
                unit: "%",
                inputs: [
                    { label: "جنسیت", type: "select", id: "gender", options: ["مرد", "زن"], default: "مرد" },
                    { label: "وزن (کیلوگرم)", type: "number", id: "weight_bf", default: 70, step: 1 },
                    { label: "دور کمر (cm)", type: "number", id: "waist_cm", default: 82, step: 1 },
                    { label: "دور گردن (cm)", type: "number", id: "neck_cm", default: 36, step: 1 },
                    { label: "دور لگن (زن) cm", type: "number", id: "hip_cm", default: 95, step: 1 }
                ],
                calculate: (vals) => {
                    let gender = vals.gender, w = vals.weight_bf, waist = vals.waist_cm, neck = vals.neck_cm, hip = vals.hip_cm || waist;
                    let bf = 0;
                    if (gender === "مرد") bf = 86.010 * Math.log10(waist - neck) - 70.041 * Math.log10(w) + 36.76;
                    else bf = 163.205 * Math.log10(waist + hip - neck) - 97.684 * Math.log10(w) - 78.387;
                    bf = Math.min(Math.max(bf, 5), 50);
                    let status = "", range = "";
                    if (gender === "مرد") {
                        if (bf < 8) { status = "چربی بسیار کم"; range = "low"; }
                        else if (bf < 20) { status = "سلامت"; range = "normal"; }
                        else if (bf < 25) { status = "مقبول"; range = "over"; }
                        else { status = "چربی بالا"; range = "high"; }
                    } else {
                        if (bf < 14) { status = "چربی کم"; range = "low"; }
                        else if (bf < 28) { status = "سلامت"; range = "normal"; }
                        else if (bf < 32) { status = "مقبول"; range = "over"; }
                        else { status = "چربی بالا"; range = "high"; }
                    }
                    return { value: bf.toFixed(1), status, range };
                },
                info: "روش نیروی دریایی آمریکا (US Navy) با دقت بالا",
                ranges: { min: 5, max: 45, normalMin: 14, normalMax: 28 },
                advice: {
                    low: "درصد چربی بسیار پایین. ممکن است به سیستم ایمنی فشار وارد شود. مشاوره تغذیه توصیه می‌شود.",
                    normal: "درصد چربی در محدوده سالم. عملکرد بدنی مطلوب و سلامت قلبی-عروقی خوب است.",
                    over: "چربی نسبتاً بالا. کاهش ۲-۵ درصد چربی می‌تواند بهبود چشمگیری در سلامت ایجاد کند.",
                    high: "چربی بالا. خطر بیماری‌های متابولیک افزایش یافته. شروع برنامه ورزشی و رژیم ضروری است."
                }
            },
            whtr: {
                name: "نسبت دور کمر به قد",
                icon: "fas fa-arrows-alt",
                unit: "",
                inputs: [
                    { label: "قد (سانتی‌متر)", type: "number", id: "height_whtr", default: 175, step: 1 },
                    { label: "دور کمر (سانتی‌متر)", type: "number", id: "waist_whtr", default: 82, step: 1 }
                ],
                calculate: (vals) => {
                    let ratio = vals.waist_whtr / vals.height_whtr;
                    let status = "", range = "";
                    if (ratio < 0.4) { status = "بسیار عالی"; range = "excellent"; }
                    else if (ratio < 0.5) { status = "سلامت"; range = "normal"; }
                    else if (ratio < 0.6) { status = "افزایش خطر"; range = "risk"; }
                    else { status = "خطر بالا"; range = "high"; }
                    return { value: ratio.toFixed(2), status, range };
                },
                info: "نسبت کمتر از 0.5 نشان‌دهنده خطر کم بیماری‌های قلبی",
                ranges: { min: 0.3, max: 0.7, normalMin: 0, normalMax: 0.5 },
                advice: {
                    excellent: "نسبت دور کمر به قد عالی! سلامت قلبی-عروقی در وضعیت مطلوب است.",
                    normal: "نسبت مناسب. خطر بیماری‌های قلبی در محدوده قابل قبول است.",
                    risk: "نسبت افزایش یافته. کاهش دور کمر با ورزش هوازی و رژیم توصیه می‌شود.",
                    high: "نسبت بالا. خطر جدی بیماری‌های قلبی و متابولیک. مشاوره پزشکی ضروری است."
                }
            },
            lbm: {
                name: "توده بدون چربی (LBM)",
                icon: "fas fa-dumbbell",
                unit: "kg",
                inputs: [
                    { label: "وزن (کیلوگرم)", type: "number", id: "weight_lbm", default: 70, step: 1 },
                    { label: "درصد چربی بدن", type: "number", id: "bodyfat_percent", default: 18, step: 1, min: 5, max: 45 }
                ],
                calculate: (vals) => {
                    let lbm = vals.weight_lbm * (1 - vals.bodyfat_percent / 100);
                    let status = "توده عضلانی + استخوان + اعضا";
                    return { value: lbm.toFixed(1), status, range: "normal" };
                },
                info: "LBM = وزن کل × (۱ - درصد چربی/۱۰۰)",
                advice: { normal: "توده بدون چربی شما. برای افزایش توده عضلانی، تمرینات مقاومتی و پروتئین کافی مصرف کنید." }
            },
            bmr: {
                name: "نرخ متابولیسم پایه (BMR)",
                icon: "fas fa-fire",
                unit: "کالری/روز",
                inputs: [
                    { label: "جنسیت", type: "select", id: "gender_bmr", options: ["مرد", "زن"], default: "مرد" },
                    { label: "سن (سال)", type: "number", id: "age_bmr", default: 30, step: 1 },
                    { label: "وزن (کیلوگرم)", type: "number", id: "weight_bmr", default: 70, step: 1 },
                    { label: "قد (سانتی‌متر)", type: "number", id: "height_bmr", default: 175, step: 1 }
                ],
                calculate: (vals) => {
                    let bmr = (vals.gender_bmr === "مرد") ? (10 * vals.weight_bmr + 6.25 * vals.height_bmr - 5 * vals.age_bmr + 5) : (10 * vals.weight_bmr + 6.25 * vals.height_bmr - 5 * vals.age_bmr - 161);
                    return { value: Math.round(bmr), status: "کالری مورد نیاز در حالت استراحت", range: "normal" };
                },
                info: "معادله Mifflin-St Jeor (دقیق‌ترین روش)",
                advice: { normal: "BMR میزان کالری مورد نیاز بدن برای عملکردهای پایه است. برای کاهش وزن، کالری دریافتی را کمتر از TDEE قرار دهید." }
            },
            vo2max: {
                name: "حداکثر اکسیژن مصرفی (VO₂max)",
                icon: "fas fa-lungs",
                unit: "ml/kg/min",
                inputs: [
                    { label: "سن (سال)", type: "number", id: "age_vo2", default: 35, step: 1 },
                    { label: "ضربان قلب استراحت", type: "number", id: "hr_rest", default: 70, step: 1 },
                    { label: "سطح فعالیت", type: "select", id: "activity_level", options: ["کم تحرک", "نیمه فعال", "فعال", "ورزشکار"], default: "نیمه فعال" }
                ],
                calculate: (vals) => {
                    let age = vals.age_vo2, hr = vals.hr_rest, act = vals.activity_level;
                    let vo2 = 35;
                    if (act === "کم تحرک") vo2 = 15.3 * (age/40) + 30;
                    else if (act === "نیمه فعال") vo2 = 35 + (60 - age) * 0.2;
                    else if (act === "فعال") vo2 = 42 + (55 - age) * 0.25;
                    else vo2 = 52 + (50 - age) * 0.3;
                    vo2 = Math.max(25, Math.min(vo2 + (hr<65 ? 3 : (hr>80 ? -2 : 0)), 65));
                    let status = "", range = "";
                    if (vo2 < 35) { status = "ضعیف"; range = "poor"; }
                    else if (vo2 < 45) { status = "متوسط"; range = "average"; }
                    else if (vo2 < 55) { status = "خوب"; range = "good"; }
                    else { status = "عالی"; range = "excellent"; }
                    return { value: vo2.toFixed(1), status, range };
                },
                info: "تخمین غیرمستقیم بر اساس سطح فعالیت",
                ranges: { min: 25, max: 65, normalMin: 35, normalMax: 55 },
                advice: {
                    poor: "آمادگی قلبی-تنفسی پایین است. شروع با پیاده روی تند و دوچرخه ثابت توصیه می‌شود.",
                    average: "آمادگی متوسط. با افزایش تدریجی شدت تمرینات، VO₂max بهبود می‌یابد.",
                    good: "آمادگی خوب. تمرینات اینتروال می‌تواند شما را به سطح عالی برساند.",
                    excellent: "آمادگی عالی! تداوم برنامه تمرینی فعلی را حفظ کنید."
                }
            },
            tdee: {
                name: "کالری مصرف روزانه (TDEE)",
                icon: "fas fa-apple-alt",
                unit: "کالری/روز",
                inputs: [
                    { label: "BMR (کالری)", type: "number", id: "bmr_input", default: 1600, step: 10 },
                    { label: "سطح فعالیت", type: "select", id: "activity_tdee", options: ["بی تحرک", "کمی فعال", "نسبتا فعال", "فعال", "بسیار فعال"], default: "نسبتا فعال" }
                ],
                calculate: (vals) => {
                    const factor = { "بی تحرک": 1.2, "کمی فعال": 1.375, "نسبتا فعال": 1.55, "فعال": 1.725, "بسیار فعال": 1.9 };
                    let tdee = vals.bmr_input * factor[vals.activity_tdee];
                    return { value: Math.round(tdee), status: "مصرف روزانه برای حفظ وزن", range: "normal" };
                },
                info: "TDEE = BMR × ضریب فعالیت",
                advice: { normal: "برای کاهش وزن 300-500 کالری از TDEE کم کنید. برای افزایش وزن، 300-500 کالری اضافه کنید." }
            }
        };

        let activeCharts = {};

        function getCategoryFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('cat');
        }

        function updateURL(catId) {
            const newUrl = catId ? `${window.location.pathname}?cat=${catId}` : window.location.pathname;
            window.history.pushState({ cat: catId }, '', newUrl);
        }

        function goToHome() {
            window.location.href = 'main-page.html';
        }

        function renderCategoryList() {
            const app = document.getElementById('appRoot');
            app.innerHTML = `
                <div class="home-btn" id="homePageBtn">
                    <i class="fas fa-home"></i> صفحه اصلی سایت
                </div>
                <div class="hero-glass">
                    <h1><i class="fas fa-calculator"></i> ماشین حساب پیشرفته ترکیب بدن</h1>
                    <p>محاسبات دقیق علمی | BMI · درصد چربی · BMR · VO₂max · کالری مصرفی و بیشتر</p>
                </div>
                <div class="tools-grid" id="toolsGrid"></div>
            `;
            document.getElementById('homePageBtn').addEventListener('click', goToHome);
            const grid = document.getElementById('toolsGrid');
            Object.entries(toolsData).forEach(([id, tool]) => {
                const card = createToolCard(id, tool);
                grid.appendChild(card);
                attachToolEvents(card, id);
                updateTool(id);
            });
        }

        function renderSingleTool(toolId) {
            const tool = toolsData[toolId];
            if (!tool) { renderCategoryList(); return; }
            const app = document.getElementById('appRoot');
            app.innerHTML = `
                <div class="single-tool-wrapper">
                    <div class="back-btn" id="backToListBtn">
                        <i class="fas fa-arrow-right"></i> بازگشت به لیست تمام ابزارها
                    </div>
                    <div id="singleToolContainer"></div>
                </div>
            `;
            const container = document.getElementById('singleToolContainer');
            const card = createToolCard(toolId, tool);
            container.appendChild(card);
            attachToolEvents(card, toolId);
            updateTool(toolId);
            document.getElementById('backToListBtn').addEventListener('click', () => {
                updateURL(null);
                renderCategoryList();
            });
        }

        function createToolCard(id, tool) {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.setAttribute('data-tool-id', id);
            
            let inputsHtml = '';
            tool.inputs.forEach(inp => {
                if (inp.type === 'select') {
                    let opts = inp.options.map(opt => `<option value="${opt}" ${opt === inp.default ? 'selected' : ''}>${opt}</option>`).join('');
                    inputsHtml += `<div class="input-group"><label>${inp.label}</label><select id="${id}_${inp.id}" data-tool="${id}">${opts}</select></div>`;
                } else {
                    inputsHtml += `<div class="input-group"><label>${inp.label}</label><input type="number" id="${id}_${inp.id}" data-tool="${id}" value="${inp.default}" step="${inp.step || 1}" min="${inp.min || 0}" max="${inp.max || ''}"></div>`;
                }
            });
            
            card.innerHTML = `
                <div class="tool-title"><i class="${tool.icon}"></i> ${tool.name}</div>
                <div class="inputs-area">${inputsHtml}</div>
                <div class="result-area" id="result_${id}">
                    <span class="result-value">---</span> <span>${tool.unit || ''}</span>
                    <div class="status-badge" id="status_${id}">-</div>
                </div>
                <div class="chart-container" id="chart_${id}"><canvas id="canvas_${id}" width="130" height="120" class="small-canvas"></canvas></div>
                <div class="info-section" id="info_${id}">
                    <div class="info-title"><i class="fas fa-chart-simple"></i> وضعیت بصری</div>
                    <div class="visual-range" id="visualRange_${id}">
                        <div class="visual-fill" id="visualFill_${id}" style="width: 0%; background: linear-gradient(90deg, #4ecdc4, #ff6b6b);"></div>
                    </div>
                    <div class="range-labels" id="rangeLabels_${id}"></div>
                    <div class="advice-text" id="advice_${id}"></div>
                </div>
                <div class="info-note"><i class="fas fa-info-circle"></i> ${tool.info}</div>
            `;
            return card;
        }

        function attachToolEvents(card, toolId) {
            const inputs = card.querySelectorAll('input, select');
            inputs.forEach(inp => {
                inp.removeEventListener('input', () => updateTool(toolId));
                inp.addEventListener('input', () => updateTool(toolId));
            });
        }

        function updateTool(toolId) {
            const tool = toolsData[toolId];
            if (!tool) return;
            
            const values = {};
            tool.inputs.forEach(inp => {
                const el = document.getElementById(`${toolId}_${inp.id}`);
                if (el) {
                    if (el.type === 'number') values[inp.id] = parseFloat(el.value) || 0;
                    else values[inp.id] = el.value;
                }
            });
            
            const result = tool.calculate(values);
            const resultDiv = document.getElementById(`result_${toolId}`);
            if (resultDiv) {
                const valSpan = resultDiv.querySelector('.result-value');
                if (valSpan) valSpan.innerText = result.value;
                const statusSpan = document.getElementById(`status_${toolId}`);
                if (statusSpan) {
                    statusSpan.innerText = result.status;
                    let bgColor = result.range === 'normal' ? 'rgba(72,187,120,0.8)' : (result.range === 'over' || result.range === 'risk' ? 'rgba(237,137,54,0.8)' : 'rgba(220,53,69,0.8)');
                    if (result.range === 'excellent' || result.range === 'good') bgColor = 'rgba(72,187,120,0.8)';
                    statusSpan.style.background = bgColor;
                }
            }
            
            renderMiniChart(toolId, result);
            updateVisualInfo(toolId, tool, result);
        }

        function updateVisualInfo(toolId, tool, result) {
            const fillDiv = document.getElementById(`visualFill_${toolId}`);
            const labelsDiv = document.getElementById(`rangeLabels_${toolId}`);
            const adviceDiv = document.getElementById(`advice_${toolId}`);
            
            if (!fillDiv) return;
            
            let percent = 0;
            let val = parseFloat(result.value);
            if (tool.ranges) {
                percent = ((val - tool.ranges.min) / (tool.ranges.max - tool.ranges.min)) * 100;
                percent = Math.min(100, Math.max(0, percent));
                fillDiv.style.width = `${percent}%`;
                
                if (labelsDiv) {
                    labelsDiv.innerHTML = `<span>${tool.ranges.min}</span><span>محدوده هدف: ${tool.ranges.normalMin} - ${tool.ranges.normalMax}</span><span>${tool.ranges.max}</span>`;
                }
            }
            
            if (adviceDiv && tool.advice) {
                if (result.range && tool.advice[result.range]) adviceDiv.innerText = tool.advice[result.range];
                else if (tool.advice.normal) adviceDiv.innerText = tool.advice.normal;
                else adviceDiv.innerText = "برای اطلاعات بیشتر با متخصص مشورت کنید.";
            }
        }

        function renderMiniChart(toolId, result) {
            const canvas = document.getElementById(`canvas_${toolId}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let val = parseFloat(result.value);
            if (isNaN(val)) val = 0;
            let percent = 0;
            if (toolId === 'bmi') percent = Math.min(100, (val / 40) * 100);
            else if (toolId === 'bodyfat') percent = Math.min(100, val);
            else if (toolId === 'whtr') percent = Math.min(100, val * 100);
            else if (toolId === 'lbm') percent = Math.min(100, (val / 100) * 100);
            else if (toolId === 'bmr' || toolId === 'tdee') percent = Math.min(100, (val / 3500) * 100);
            else if (toolId === 'vo2max') percent = Math.min(100, (val / 65) * 100);
            else percent = 50;
            
            if (activeCharts[toolId]) activeCharts[toolId].destroy();
            activeCharts[toolId] = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [percent, 100 - percent], backgroundColor: ['#4ecdc4', 'rgba(255,255,255,0.2)'], borderWidth: 0, cutout: '68%' }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
            setTimeout(() => {
                if (activeCharts[toolId] && activeCharts[toolId].ctx) {
                    activeCharts[toolId].ctx.font = 'bold 14px Inter';
                    activeCharts[toolId].ctx.fillStyle = '#ffffff';
                    activeCharts[toolId].ctx.textAlign = 'center';
                    activeCharts[toolId].ctx.textBaseline = 'middle';
                    activeCharts[toolId].ctx.fillText(result.value, canvas.width/2, canvas.height/2);
                }
            }, 70);
        }

        window.addEventListener('popstate', () => {
            const cat = getCategoryFromURL();
            if (cat && toolsData[cat]) renderSingleTool(cat);
            else renderCategoryList();
        });

        function init() {
            const initialCat = getCategoryFromURL();
            if (initialCat && toolsData[initialCat]) renderSingleTool(initialCat);
            else renderCategoryList();
        }
        init();
    </script>
</body>
</html>
