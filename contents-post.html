<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مجله GAMva | مقالات تخصصی ورزش و سلامت</title>

    <!-- فونت وزیرمتن و آیکون‌ها -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- استایل اصلی پروژه -->
    <link rel="stylesheet" href="assets/style.css">
    
    <style>
        /* تنظیمات اختصاصی صفحه مجله - هماهنگ با تم GAMva */
        .magazine-container {
            max-width: 1400px;
            margin: 1rem auto;
            padding: 0 1rem;
        }

        /* هدر مجله */
        .magazine-header {
            text-align: center;
            margin: 1.5rem 0 2rem;
        }
        .magazine-header h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .magazine-header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* دسته‌بندی‌ها (چیپس) */
        .category-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }
        .chip-category {
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            padding: 0.5rem 1.2rem;
            border-radius: var(--radius-full);
            font-size: var(--font-sm);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-base);
            color: var(--text-muted);
        }
        .chip-category.active, .chip-category:hover {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        /* استوری‌های بالای صفحه */
        .stories-row {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            padding-bottom: 0.8rem;
            margin-bottom: 2rem;
            scrollbar-width: thin;
        }
        .story-item {
            text-align: center;
            min-width: 85px;
            cursor: pointer;
            transition: var(--transition-base);
        }
        .story-item:hover {
            transform: translateY(-3px);
        }
        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 2px;
            margin-bottom: 0.5rem;
        }
        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-glass);
        }
        .story-name {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        /* گرید مقالات */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }
        .post-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition-bounce);
            cursor: pointer;
            position: relative;
        }
        .post-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            z-index: -2;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .post-card:hover::after {
            opacity: 1;
            animation: borderPulse 2s infinite;
        }
        .post-card:hover {
            transform: translateY(-6px);
        }
        .post-card.featured {
            grid-column: span 2;
            display: flex;
            flex-direction: row;
        }
        .post-card.featured .card-media {
            width: 50%;
            height: auto;
        }
        .post-card.featured .card-content {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card-media {
            position: relative;
            height: 200px;
            overflow: hidden;
        }
        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .post-card:hover .card-media img {
            transform: scale(1.05);
        }
        .post-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            color: white;
        }
        .author-badge {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            color: white;
        }
        .card-content {
            padding: 1rem;
        }
        .post-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-excerpt {
            font-size: var(--font-sm);
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        /* صفحه اختصاصی مقاله */
        .single-post {
            max-width: 900px;
            margin: 0 auto;
        }
        .single-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .single-category {
            display: inline-block;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            padding: 0.3rem 1rem;
            border-radius: var(--radius-full);
            font-size: var(--font-sm);
            color: var(--secondary);
            margin-bottom: 1rem;
        }
        .single-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        .single-meta {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: var(--font-sm);
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .single-image {
            width: 100%;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
        }
        .single-content {
            color: var(--text-secondary);
            line-height: 1.9;
            font-size: 1rem;
        }
        .single-content p {
            margin-bottom: 1.2rem;
        }
        .pull-quote {
            background: var(--bg-glass-light);
            border-right: 4px solid var(--secondary);
            padding: 1.5rem;
            margin: 1.5rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            border-radius: var(--radius-lg);
        }
        .interaction-bar {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .interact-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: var(--transition-base);
            color: var(--text-primary);
        }
        .interact-btn:hover {
            background: var(--gradient-primary);
            color: white;
        }
        .comments-section {
            margin-top: 2rem;
        }
        .comment-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-glass);
        }
        .comment-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .comment-content {
            flex: 1;
        }
        .comment-author {
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .comment-date {
            font-size: var(--font-xs);
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .comment-text {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .reply-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: var(--font-xs);
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .replies {
            margin-right: 2rem;
            margin-top: 1rem;
            padding-right: 1rem;
            border-right: 2px solid var(--border-glass);
        }
        .add-comment {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .add-comment input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
        }

        @media (max-width: 768px) {
            .post-card.featured {
                grid-column: span 1;
                flex-direction: column;
            }
            .post-card.featured .card-media {
                width: 100%;
                height: 200px;
            }
            .post-card.featured .card-content {
                width: 100%;
            }
            .stories-row {
                gap: 0.8rem;
            }
            .story-avatar {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

    <script src="assets/scripts.js"></script>
    <script>
        (function() {
            // ========== داده‌های مقالات ==========
            const baseImage = "assets/img/stoke/download (1).jpg";
            
            let posts = [
                { id: 1, title: "۱۰ تمرین معجزه‌آسا برای عضلات مرکزی", excerpt: "تمریناتی که زندگی شما را متحول می‌کند...", content: "تمرینات پلانک، کرانچ معکوس، پل یک پا و... این حرکات توسط بهترین مربیان جهان توصیه شده‌اند. با انجام منظم این تمرینات، عضلات مرکزی خود را تقویت کرده و از کمردرد جلوگیری کنید.", image: baseImage, type: "article", category: "تمرین", author: "تیم تحریریه", authorAvatar: "https://randomuser.me/api/portraits/men/32.jpg", date: "۱۴۰۳/۱۰/۱۵", likes: 124, bookmarks: 45, comments: [] },
                { id: 2, title: "مصاحبه اختصاصی با قهرمان بدنسازی ایران", excerpt: "از سختی‌ها تا قهرمانی؛ روایتی شنیدنی...", content: "در این مصاحبه اختصاصی با قهرمان بدنسازی ایران، از رازهای موفقیت، برنامه تمرینی و تغذیه او صحبت کرده‌ایم. او می‌گوید: 'هیچ موفقیتی بدون پشتکار و انضباط به دست نمی‌آید.'", image: baseImage, type: "video", category: "مصاحبه", author: "امیرعلی سلیمی", authorAvatar: "https://randomuser.me/api/portraits/men/45.jpg", date: "۱۴۰۳/۱۰/۱۲", likes: 89, bookmarks: 23, comments: [], featured: true },
                { id: 3, title: "رازهای تغذیه ورزشکاران حرفه‌ای", excerpt: "چه بخوریم تا بهترین عملکرد را داشته باشیم؟", content: "تغذیه مناسب قبل و بعد از تمرین، اهمیت پروتئین، کربوهیدرات و چربی‌های سالم. در این مقاله به بررسی دقیق برنامه غذایی ورزشکاران حرفه‌ای می‌پردازیم.", image: baseImage, type: "article", category: "تغذیه", author: "دکتر محمد رضایی", authorAvatar: "https://randomuser.me/api/portraits/men/22.jpg", date: "۱۴۰۳/۱۰/۱۰", likes: 67, bookmarks: 31, comments: [] },
                { id: 4, title: "اهمیت ریکاوری در ورزش", excerpt: "چرا استراحت به اندازه تمرین مهم است؟", content: "ریکاوری فعال، خواب کافی، تغذیه مناسب و... در این پادکست تخصصی با دکتر سارا احمدی درباره اهمیت استراحت در فرآیند ورزش صحبت می‌کنیم.", image: baseImage, type: "podcast", category: "پادکست", author: "دکتر سارا احمدی", authorAvatar: "https://randomuser.me/api/portraits/women/44.jpg", date: "۱۴۰۳/۱۰/۰۸", likes: 45, bookmarks: 18, comments: [] },
                { id: 5, title: "نکات طلایی برای شروع دویدن", excerpt: "از صفر تا صد؛ راهنمای کامل برای مبتدیان", content: "انتخاب کفش مناسب، گرم کردن، تکنیک صحیح دویدن، برنامه افزایش تدریجی مسافت. اگر تازه تصمیم گرفته‌اید دویدن را شروع کنید، این مقاله برای شماست.", image: baseImage, type: "article", category: "تمرین", author: "تیم تحریریه", authorAvatar: "https://randomuser.me/api/portraits/men/65.jpg", date: "۱۴۰۳/۱۰/۰۵", likes: 56, bookmarks: 22, comments: [] },
                { id: 6, title: "مدیریت استرس در ورزش", excerpt: "تکنیک‌های روانشناسی برای بهبود عملکرد", content: "استرس می‌تواند عملکرد ورزشی را کاهش دهد. در این مقاله با تکنیک‌های تنفس، مدیتیشن و تمرکز آشنا می‌شوید.", image: baseImage, type: "article", category: "روانشناسی", author: "نرگس تقوی", authorAvatar: "https://randomuser.me/api/portraits/women/68.jpg", date: "۱۴۰۳/۱۰/۰۲", likes: 78, bookmarks: 34, comments: [] }
            ];

            // کامنت نمونه برای پست اول
            posts[0].comments = [
                { id: 101, author: "رضا کریمی", avatar: "ر", text: "مقاله فوق‌العاده‌ای بود! ممنون", date: "۱۴۰۳/۱۰/۱۴", replies: [] }
            ];

            let currentPost = null;
            let nextCommentId = 200;

            // ذخیره وضعیت در localStorage
            function savePosts() {
                localStorage.setItem('gamva_posts', JSON.stringify(posts));
            }
            function loadPosts() {
                const stored = localStorage.getItem('gamva_posts');
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (parsed.length) posts = parsed;
                    } catch(e) {}
                }
            }
            loadPosts();

            // ========== صفحه اصلی (لیست مقالات) ==========
            function renderHome() {
                const container = document.getElementById('dynamicContent');
                container.innerHTML = `
                    <div class="stories-row fade-up" id="storiesRow"></div>
                    <div class="category-chips fade-up" id="categoryChips"></div>
                    <div class="posts-grid fade-up" id="postsGrid"></div>
                `;
                
                // استوری‌ها
                const storiesRow = document.getElementById('storiesRow');
                storiesRow.innerHTML = posts.slice(0, 8).map(post => `
                    <div class="story-item" data-id="${post.id}">
                        <div class="story-avatar"><img src="${post.image}" alt=""></div>
                        <div class="story-name">${post.title.substring(0, 10)}..</div>
                    </div>
                `).join('');
                document.querySelectorAll('.story-item').forEach(el => {
                    el.addEventListener('click', () => openSinglePost(parseInt(el.dataset.id)));
                });
                
                // دسته‌بندی‌ها
                const categories = ['همه', 'تمرین', 'تغذیه', 'مصاحبه', 'پادکست', 'روانشناسی'];
                const chipsDiv = document.getElementById('categoryChips');
                chipsDiv.innerHTML = categories.map(cat => `
                    <button class="chip-category ${cat === 'همه' ? 'active' : ''}" data-cat="${cat}">${cat}</button>
                `).join('');
                
                let currentCategory = 'همه';
                function filterPosts() {
                    let filtered = currentCategory === 'همه' ? posts : posts.filter(p => p.category === currentCategory);
                    const grid = document.getElementById('postsGrid');
                    grid.innerHTML = filtered.map(post => `
                        <div class="post-card ${post.featured ? 'featured' : ''}" data-id="${post.id}">
                            <div class="card-media">
                                <img src="${post.image}" alt="${post.title}">
                                <span class="post-badge">${post.type === 'article' ? '📄 مقاله' : post.type === 'video' ? '🎬 ویدیو' : '🎙️ پادکست'}</span>
                                <span class="author-badge"><i class="fas fa-user"></i> ${post.author}</span>
                            </div>
                            <div class="card-content">
                                <h3 class="post-title">${post.title}</h3>
                                <p class="post-excerpt">${post.excerpt}</p>
                                <div class="post-meta">
                                    <span><i class="fas fa-calendar"></i> ${post.date}</span>
                                    <span><i class="fas fa-heart"></i> ${post.likes}</span>
                                    <span><i class="fas fa-comment"></i> ${post.comments.length}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    document.querySelectorAll('.post-card').forEach(card => {
                        card.addEventListener('click', () => openSinglePost(parseInt(card.dataset.id)));
                    });
                }
                filterPosts();
                
                document.querySelectorAll('.chip-category').forEach(chip => {
                    chip.addEventListener('click', () => {
                        document.querySelectorAll('.chip-category').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        currentCategory = chip.dataset.cat;
                        filterPosts();
                    });
                });
            }
            
            // ========== صفحه اختصاصی مقاله ==========
            function openSinglePost(postId) {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                currentPost = post;
                const container = document.getElementById('dynamicContent');
                container.innerHTML = `
                    <div class="single-post fade-up">
                        <div class="single-header">
                            <span class="single-category">${post.category}</span>
                            <h1 class="single-title">${post.title}</h1>
                            <div class="single-meta">
                                <span><i class="fas fa-user"></i> ${post.author}</span>
                                <span><i class="fas fa-calendar"></i> ${post.date}</span>
                                <span><i class="fas fa-clock"></i> ۵ دقیقه مطالعه</span>
                            </div>
                        </div>
                        <img src="${post.image}" class="single-image" alt="${post.title}">
                        <div class="interaction-bar">
                            <button class="interact-btn" id="likeBtn"><i class="fas fa-heart"></i> <span id="likeCount">${post.likes}</span></button>
                            <button class="interact-btn" id="bookmarkBtn"><i class="fas fa-bookmark"></i> <span id="bookmarkCount">${post.bookmarks}</span></button>
                            <button class="interact-btn" id="shareBtn"><i class="fas fa-share-alt"></i> اشتراک‌گذاری</button>
                            <button class="interact-btn" id="backBtn"><i class="fas fa-arrow-right"></i> بازگشت</button>
                        </div>
                        <div class="single-content">
                            <p>${post.content}</p>
                            <div class="pull-quote">
                                <i class="fas fa-quote-right"></i> "ورزش فقط یک فعالیت نیست؛ یک سبک زندگی است"
                            </div>
                            <p>تمرینات منظم و تغذیه مناسب، کلید اصلی رسیدن به اهداف ورزشی است. فراموش نکنید که صبوری و پشتکار، مهم‌ترین عوامل موفقیت هستند. با GAMva همراه باشید تا بهترین نسخه خودتان شوید.</p>
                        </div>
                        <div class="comments-section">
                            <h3 style="margin-bottom: 1rem;">نظرات (${post.comments.length})</h3>
                            <div id="commentsContainer"></div>
                            <div class="add-comment">
                                <input type="text" id="newCommentInput" placeholder="نظر خود را بنویسید...">
                                <button class="interact-btn" id="addCommentBtn">ارسال نظر</button>
                            </div>
                        </div>
                    </div>
                `;
                renderComments();
                
                document.getElementById('likeBtn').addEventListener('click', () => {
                    currentPost.likes++;
                    document.getElementById('likeCount').innerText = currentPost.likes;
                    savePosts();
                });
                document.getElementById('bookmarkBtn').addEventListener('click', () => {
                    currentPost.bookmarks++;
                    document.getElementById('bookmarkCount').innerText = currentPost.bookmarks;
                    savePosts();
                });
                document.getElementById('shareBtn').addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href);
                    if (window.showToast) window.showToast('🔗 لینک مقاله کپی شد!', 'success');
                });
                document.getElementById('backBtn').addEventListener('click', () => {
                    renderHome();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                document.getElementById('addCommentBtn').addEventListener('click', addComment);
            }
            
            function renderComments() {
                const container = document.getElementById('commentsContainer');
                if (!container || !currentPost) return;
                container.innerHTML = currentPost.comments.map(comment => `
                    <div class="comment-item">
                        <div class="comment-avatar">${comment.avatar || comment.author.charAt(0)}</div>
                        <div class="comment-content">
                            <div class="comment-author">${comment.author}</div>
                            <div class="comment-date">${comment.date}</div>
                            <div class="comment-text">${comment.text}</div>
                            <button class="reply-btn" onclick="window.showReplyForm(${comment.id})">پاسخ</button>
                            <div id="replyForm-${comment.id}" style="display:none; margin-top:0.5rem;">
                                <input type="text" id="replyInput-${comment.id}" placeholder="پاسخ خود را بنویسید..." style="width:100%; padding:0.5rem; border-radius:20px; border:1px solid var(--border-glass); background:var(--bg-glass-light);">
                                <button class="interact-btn" style="margin-top:0.3rem;" onclick="window.submitReply(${comment.id})">ارسال پاسخ</button>
                            </div>
                            <div class="replies" id="replies-${comment.id}">
                                ${comment.replies.map(reply => `
                                    <div class="comment-item">
                                        <div class="comment-avatar">${reply.avatar || reply.author.charAt(0)}</div>
                                        <div class="comment-content">
                                            <div class="comment-author">${reply.author}</div>
                                            <div class="comment-date">${reply.date}</div>
                                            <div class="comment-text">${reply.text}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            window.showReplyForm = (commentId) => {
                const form = document.getElementById(`replyForm-${commentId}`);
                if (form) form.style.display = form.style.display === 'none' ? 'flex' : 'none';
            };
            
            window.submitReply = (commentId) => {
                const input = document.getElementById(`replyInput-${commentId}`);
                const text = input.value.trim();
                if (!text) return;
                const comment = currentPost.comments.find(c => c.id === commentId);
                if (comment) {
                    comment.replies.push({
                        id: nextCommentId++,
                        author: "کاربر GAMva",
                        avatar: "ک",
                        text: text,
                        date: new Date().toLocaleDateString('fa-IR'),
                        likes: 0
                    });
                    savePosts();
                    renderComments();
                }
                input.value = '';
                const form = document.getElementById(`replyForm-${commentId}`);
                if (form) form.style.display = 'none';
            };
            
            function addComment() {
                const input = document.getElementById('newCommentInput');
                const text = input.value.trim();
                if (!text) {
                    if (window.showToast) window.showToast('لطفاً متن نظر را وارد کنید', 'warning');
                    return;
                }
                currentPost.comments.push({
                    id: nextCommentId++,
                    author: "کاربر GAMva",
                    avatar: "ک",
                    text: text,
                    date: new Date().toLocaleDateString('fa-IR'),
                    likes: 0,
                    replies: []
                });
                savePosts();
                renderComments();
                input.value = '';
                if (window.showToast) window.showToast('نظر شما با موفقیت ثبت شد!', 'success');
            }
            
            // بررسی پارامتر URL برای نمایش مستقیم مقاله
            function getPostIdFromURL() {
                const params = new URLSearchParams(window.location.search);
                return params.get('id');
            }
            
            function init() {
                const postId = getPostIdFromURL();
                if (postId && posts.find(p => p.id == postId)) {
                    openSinglePost(parseInt(postId));
                } else {
                    renderHome();
                }
            }
            
            init();
            
            // افکت fade-up
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) e.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        })();
    </script>
</body>
</html>
