<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>چالش‌های فیت‌تولز | فراتر از محدودیت‌ها</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* پس‌زمینه داینامیک */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(78,205,196,0.08), transparent);
            z-index: -2;
        }

        /* هدر */
        .main-header {
            background: rgba(10,10,18,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(78,205,196,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ecdc4, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .home-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            padding: 10px 22px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.2s;
        }

        .home-link:hover {
            background: #4ecdc4;
            color: #0a0a12;
        }

        /* بخش هرو */
        .hero-section {
            max-width: 1400px;
            margin: 60px auto 40px;
            padding: 0 24px;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(78,205,196,0.15);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border: 1px solid rgba(78,205,196,0.3);
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-title span {
            background: linear-gradient(135deg, #4ecdc4, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* فیلتر چالش‌ها */
        .filters-bar {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .filter-chip.active, .filter-chip:hover {
            background: #4ecdc4;
            color: #0a0a12;
            border-color: #4ecdc4;
        }

        /* گرید چالش‌ها */
        .challenges-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }

        /* کارت چالش */
        .challenge-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .challenge-card:hover {
            transform: translateY(-8px);
            border-color: rgba(78,205,196,0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .card-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .challenge-card:hover .card-header img {
            transform: scale(1.05);
        }

        .difficulty-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .difficulty-badge.easy { background: #2ecc71; }
        .difficulty-badge.medium { background: #f39c12; }
        .difficulty-badge.hard { background: #e74c3c; }

        .type-badge {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .card-body {
            padding: 24px;
        }

        .challenge-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .challenge-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .challenge-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: #4ecdc4;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            height: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.5s;
        }

        .join-btn {
            width: 100%;
            background: linear-gradient(135deg, #4ecdc4, #2c7a9e);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .join-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(78,205,196,0.4);
        }

        .joined-badge {
            background: rgba(78,205,196,0.2);
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            color: #4ecdc4;
        }

        /* مودال ثبت‌نام */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: linear-gradient(135deg, #1a1a2e, #0a0a12);
            border-radius: 48px;
            max-width: 500px;
            width: 90%;
            padding: 32px;
            border: 1px solid rgba(78,205,196,0.3);
        }

        .modal-container h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .modal-container input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            margin-bottom: 16px;
            font-family: inherit;
        }

        /* رتبه‌بندی */
        .rankings-section {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 24px;
        }

        .rankings-title {
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .rankings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .ranking-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
        }

        .rank-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffd93d;
        }

        .rank-name {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .rank-score {
            color: #4ecdc4;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .challenges-grid { grid-template-columns: 1fr; }
            .filters-bar { gap: 8px; }
            .filter-chip { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="main-header">
    <div class="header-inner">
        <div class="logo">
            <h1>🏆 چالش‌ها</h1>
        </div>
        <a href="main-page.html" class="home-link">
            <i class="fas fa-home"></i> صفحه اصلی
        </a>
    </div>
</div>

<div class="hero-section">
    <div class="hero-badge">
        <i class="fas fa-fire"></i> ۱۲,۴۵۰+ شرکت‌کننده فعال
    </div>
    <h1 class="hero-title">
        به <span>چالش</span> بپیوند<br>
        و بهترین نسخه خودت شو
    </h1>
</div>

<div class="filters-bar" id="filtersBar">
    <div class="filter-chip active" data-filter="all">همه</div>
    <div class="filter-chip" data-filter="تمرینی">تمرینی</div>
    <div class="filter-chip" data-filter="تغذیه‌ای">تغذیه‌ای</div>
    <div class="filter-chip" data-filter="روحیه‌سازی">روحیه‌سازی</div>
    <div class="filter-chip" data-filter="گروهی">گروهی</div>
</div>

<div class="challenges-grid" id="challengesGrid"></div>

<div class="rankings-section">
    <h2 class="rankings-title">
        <i class="fas fa-trophy"></i> برترین‌های این هفته
    </h2>
    <div class="rankings-grid" id="rankingsGrid"></div>
</div>

<!-- مودال ثبت‌نام -->
<div id="joinModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-user-plus"></i> ثبت‌نام در چالش</h3>
        <input type="text" id="userName" placeholder="نام و نام خانوادگی">
        <input type="email" id="userEmail" placeholder="ایمیل">
        <button id="confirmJoinBtn" class="join-btn" style="margin-top:10px;">تأیید و ثبت‌نام</button>
        <button id="closeModalBtn" style="margin-top:16px; background:none; border:none; color:#888; cursor:pointer;">بستن</button>
    </div>
</div>

<script>
    // داده‌های چالش‌ها
    let challenges = [
        { id: 1, title: "۳۰ روز پلانک", desc: "هر روز پلانک بزن و قدرت هسته مرکزی خودت رو افزایش بده", type: "تمرینی", difficulty: "easy", duration: "۳۰ روز", participants: 2340, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 2, title: "۷ روز سم زدایی", desc: "رژیم غذایی پاک و سم‌زدایی طبیعی بدن", type: "تغذیه‌ای", difficulty: "medium", duration: "۷ روز", participants: 1890, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 3, title: "۱۰۰۰۰ قدم روزانه", desc: "هر روز ۱۰ هزار قدم راه برو و سلامت قلبت رو تضمین کن", type: "تمرینی", difficulty: "easy", duration: "۲۱ روز", participants: 5670, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 4, title: "مدیتیشن صبحگاهی", desc: "۱۰ دقیقه مدیتیشن هر روز برای آرامش ذهن", type: "روحیه‌سازی", difficulty: "easy", duration: "۱۴ روز", participants: 3210, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 5, title: "چالش اسکوات", desc: "۱۰۰ اسکوات در روز برای پاهای نیرومند", type: "تمرینی", difficulty: "hard", duration: "۳۰ روز", participants: 4560, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 6, title: "نوشیدن آب کافی", desc: "روزی ۳ لیتر آب بنوش و انرژی بگیر", type: "تغذیه‌ای", difficulty: "easy", duration: "۱۰ روز", participants: 7890, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 7, title: "چالش گروهی: تیم خودت رو بساز", desc: "با دوستانت تیم تشکیل بده و با هم پیشرفت کنید", type: "گروهی", difficulty: "medium", duration: "۴۵ روز", participants: 2340, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false },
        { id: 8, title: "یوگای روزانه", desc: "۳۰ دقیقه یوگا برای انعطاف و آرامش", type: "روحیه‌سازی", difficulty: "medium", duration: "۲۱ روز", participants: 1980, progress: 0, image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", joined: false }
    ];

    // رتبه‌بندی
    let rankings = [
        { rank: 1, name: "امیرعلی سلیمی", score: 2840, badge: "🥇" },
        { rank: 2, name: "سارا حسینی", score: 2760, badge: "🥈" },
        { rank: 3, name: "رضا کریمی", score: 2590, badge: "🥉" },
        { rank: 4, name: "نرگس تقوی", score: 2410 },
        { rank: 5, name: "مهدی نوروزی", score: 2280 }
    ];

    let currentFilter = "all";
    let selectedChallenge = null;

    function renderChallenges() {
        let filtered = challenges.filter(c => currentFilter === "all" || c.type === currentFilter);
        const grid = document.getElementById('challengesGrid');
        grid.innerHTML = filtered.map(ch => `
            <div class="challenge-card" data-id="${ch.id}">
                <div class="card-header">
                    <img src="${ch.image}" alt="${ch.title}">
                    <span class="difficulty-badge ${ch.difficulty}">
                        ${ch.difficulty === 'easy' ? 'آسان' : ch.difficulty === 'medium' ? 'متوسط' : 'سخت'}
                    </span>
                    <span class="type-badge">
                        <i class="fas ${ch.type === 'تمرینی' ? 'fa-dumbbell' : ch.type === 'تغذیه‌ای' ? 'fa-apple-alt' : ch.type === 'روحیه‌سازی' ? 'fa-peace' : 'fa-users'}"></i>
                        ${ch.type}
                    </span>
                </div>
                <div class="card-body">
                    <h3 class="challenge-title">${ch.title}</h3>
                    <p class="challenge-desc">${ch.desc}</p>
                    <div class="challenge-stats">
                        <span><i class="fas fa-clock"></i> ${ch.duration}</span>
                        <span><i class="fas fa-users"></i> ${ch.participants.toLocaleString()} نفر</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${ch.progress}%"></div>
                    </div>
                    ${ch.joined ? 
                        `<div class="joined-badge"><i class="fas fa-check-circle"></i> شما در این چالش ثبت‌نام کرده‌اید</div>` :
                        `<button class="join-btn" onclick="openJoinModal(${ch.id})">ثبت‌نام در چالش</button>`
                    }
                </div>
            </div>
        `).join('');
    }

    function renderRankings() {
        const grid = document.getElementById('rankingsGrid');
        grid.innerHTML = rankings.map(r => `
            <div class="ranking-card">
                <div class="rank-number">${r.badge || r.rank}</div>
                <div class="rank-name">${r.name}</div>
                <div class="rank-score">${r.score.toLocaleString()} امتیاز</div>
            </div>
        `).join('');
    }

    window.openJoinModal = (challengeId) => {
        selectedChallenge = challenges.find(c => c.id === challengeId);
        document.getElementById('joinModal').classList.add('active');
    };

    document.getElementById('confirmJoinBtn').addEventListener('click', () => {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        if (!name || !email) {
            alert("لطفاً نام و ایمیل خود را وارد کنید");
            return;
        }
        if (selectedChallenge) {
            selectedChallenge.joined = true;
            selectedChallenge.participants++;
            alert(`🎉 تبریک! شما در چالش "${selectedChallenge.title}" ثبت‌نام کردید.`);
            document.getElementById('joinModal').classList.remove('active');
            document.getElementById('userName').value = '';
            document.getElementById('userEmail').value = '';
            renderChallenges();
        }
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('joinModal').classList.remove('active');
    });

    // فیلترها
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentFilter = chip.dataset.filter;
            renderChallenges();
        });
    });

    renderChallenges();
    renderRankings();
</script>
</body>
</html>
