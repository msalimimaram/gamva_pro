<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GAMva | اکسپلورر محتوای پیشرفته</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            color: #1a2c3e;
            overflow-x: hidden;
        }

        .global-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .global-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(22px) brightness(0.55) saturate(1.2);
            transform: scale(1.08);
        }

        .global-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.15) 100%);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        .main-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(78, 205, 196, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .home-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 60, 114, 0.1);
            padding: 10px 22px;
            border-radius: 40px;
            text-decoration: none;
            color: #1E3C72;
            font-weight: 600;
            transition: 0.3s;
        }

        .home-link:hover {
            background: #1E3C72;
            color: white;
            transform: translateX(-5px);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* هدر صفحه */
        .explore-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .explore-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(78, 205, 196, 0.12);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #4ecdc4;
            margin-bottom: 20px;
        }

        .explore-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .explore-title span {
            background: linear-gradient(135deg, #1E3C72, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .explore-desc {
            color: #6c8db0;
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* لایه اصلی */
        .explore-layout {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        /* سایدبار */
        .explore-sidebar {
            width: 300px;
            flex-shrink: 0;
        }

        /* محتوای اصلی */
        .explore-main {
            flex: 1;
            min-width: 0;
        }

        /* کارت سایدبار */
        .sidebar-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 3px solid #4ecdc4;
            padding-right: 12px;
        }

        /* فیلترها */
        .filter-group {
            margin-bottom: 24px;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c3e66;
            margin-bottom: 12px;
            display: block;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-option {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            color: #6c8db0;
        }

        .filter-option.active {
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            color: white;
        }

        /* تب‌های محتوا */
        .content-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 12px;
        }

        .content-tab {
            background: none;
            border: none;
            padding: 10px 24px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #8ca3c0;
            border-radius: 40px;
        }

        .content-tab.active {
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            color: white;
        }

        /* نماهای نمایش */
        .view-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: flex-end;
        }

        .view-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .view-btn.active {
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            color: white;
        }

        /* گرید محتوا - نمای گرید */
        .content-grid.grid-view {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        /* نمای لیست */
        .content-grid.list-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .content-grid.list-view .content-card {
            display: flex;
            flex-direction: row;
        }

        .content-grid.list-view .card-media {
            width: 200px;
            height: auto;
            flex-shrink: 0;
        }

        /* کارت محتوا */
        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
            cursor: pointer;
            position: relative;
        }

        .content-card:hover {
            transform: translateY(-8px);
            border-color: rgba(78, 205, 196, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.12);
        }

        .card-media {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .content-card:hover .card-media img {
            transform: scale(1.05);
        }

        .content-type-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            backdrop-filter: blur(4px);
        }

        .content-type-badge.article { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .content-type-badge.video { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .content-type-badge.podcast { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .content-type-badge.magazine { background: linear-gradient(135deg, #3498db, #2980b9); }
        .content-type-badge.journal { background: linear-gradient(135deg, #f39c12, #e67e22); }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .content-card:hover .card-overlay {
            opacity: 1;
        }

        .quick-actions {
            display: flex;
            gap: 16px;
        }

        .quick-action {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #1E3C72;
        }

        .quick-action:hover {
            transform: scale(1.1);
            background: #4ecdc4;
            color: white;
        }

        .card-content {
            padding: 18px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: #8ca3c0;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-stats {
            display: flex;
            gap: 12px;
        }

        .card-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* لود بیشتر */
        .load-more {
            text-align: center;
            margin-top: 48px;
        }

        .load-more-btn {
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .load-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.3);
        }

        @media (max-width: 1200px) {
            .content-grid.grid-view {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 900px) {
            .explore-layout {
                flex-direction: column;
            }
            .explore-sidebar {
                width: 100%;
            }
            .content-grid.grid-view {
                grid-template-columns: 1fr;
            }
            .content-grid.list-view .content-card {
                flex-direction: column;
            }
            .content-grid.list-view .card-media {
                width: 100%;
                height: 200px;
            }
            .explore-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="global-bg">
    <img src="assets/img/skate-park-with-ramps-in-tropical-city.jpg" alt="GAMva">
</div>
<div class="global-overlay"></div>

<div class="main-header">
    <div class="header-inner">
        <div class="logo">
            <h1><i class="fas fa-compass"></i> GAMva | اکسپلورر</h1>
        </div>
        <a href="main-page.html" class="home-link">
            <i class="fas fa-home"></i> صفحه اصلی
        </a>
    </div>
</div>

<div class="container">
    <div class="explore-header">
        <div class="explore-badge">
            <i class="fas fa-compass"></i> کشف محتوای باکیفیت
        </div>
        <h1 class="explore-title">
            <span>اکسپلورر</span> محتوای GAMva
        </h1>
        <p class="explore-desc">
            جدیدترین مقالات، ویدیوها، پادکست‌ها و محتوای تخصصی ورزش را کشف کنید
        </p>
    </div>

    <div class="explore-layout">
        <!-- سایدبار -->
        <div class="explore-sidebar">
            <div class="sidebar-card">
                <div class="sidebar-title">
                    <i class="fas fa-filter"></i> فیلترها
                </div>
                <div class="filter-group">
                    <span class="filter-label">نوع محتوا</span>
                    <div class="filter-options" id="typeFilters">
                        <button class="filter-option active" data-type="all">همه</button>
                        <button class="filter-option" data-type="article">📄 مقاله</button>
                        <button class="filter-option" data-type="video">🎬 ویدیو</button>
                        <button class="filter-option" data-type="podcast">🎙️ پادکست</button>
                        <button class="filter-option" data-type="magazine">📰 مجله</button>
                        <button class="filter-option" data-type="journal">📓 ژورنال</button>
                    </div>
                </div>
                <div class="filter-group">
                    <span class="filter-label">دسته‌بندی</span>
                    <div class="filter-options" id="categoryFilters">
                        <button class="filter-option active" data-cat="all">همه</button>
                        <button class="filter-option" data-cat="تمرین">تمرین</button>
                        <button class="filter-option" data-cat="تغذیه">تغذیه</button>
                        <button class="filter-option" data-cat="روانشناسی">روانشناسی</button>
                        <button class="filter-option" data-cat="مصاحبه">مصاحبه</button>
                    </div>
                </div>
            </div>

            <div class="sidebar-card">
                <div class="sidebar-title">
                    <i class="fas fa-chart-line"></i> محبوب این هفته
                </div>
                <div id="popularList"></div>
            </div>
        </div>

        <!-- محتوای اصلی -->
        <div class="explore-main">
            <!-- تب‌ها -->
            <div class="content-tabs">
                <button class="content-tab active" data-tab="all">🔥 همه</button>
                <button class="content-tab" data-tab="trending">📈 ترند</button>
                <button class="content-tab" data-tab="latest">✨ جدیدترین</button>
                <button class="content-tab" data-tab="following">⭐ دنبال‌شده</button>
            </div>

            <!-- نماهای نمایش -->
            <div class="view-toggle">
                <button class="view-btn active" data-view="grid"><i class="fas fa-th-large"></i></button>
                <button class="view-btn" data-view="list"><i class="fas fa-list-ul"></i></button>
            </div>

            <!-- گرید محتوا -->
            <div class="content-grid grid-view" id="contentGrid"></div>

            <!-- دکمه لود بیشتر -->
            <div class="load-more">
                <button class="load-more-btn" id="loadMoreBtn">
                    <i class="fas fa-arrow-down"></i> بارگذاری بیشتر
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // داده‌های نمونه محتوا
    const allContents = [
        { id: 1, type: "article", title: "۱۰ تمرین معجزه‌آسا برای عضلات مرکزی", category: "تمرین", author: "تیم تحریریه", authorAvatar: "https://randomuser.me/api/portraits/men/32.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 1240, likes: 345, date: "۱۴۰۳/۱۰/۱۵", trending: true },
        { id: 2, type: "video", title: "آموزش کامل حرکت ددلیفت با تکنیک حرفه‌ای", category: "تمرین", author: "امیرعلی سلیمی", authorAvatar: "https://randomuser.me/api/portraits/men/45.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 8900, likes: 2100, date: "۱۴۰۳/۱۰/۱۲", trending: true },
        { id: 3, type: "podcast", title: "رازهای تغذیه ورزشکاران حرفه‌ای", category: "تغذیه", author: "دکتر محمد رضایی", authorAvatar: "https://randomuser.me/api/portraits/men/22.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 2340, likes: 567, date: "۱۴۰۳/۱۰/۰۸", trending: false },
        { id: 4, type: "video", title: "مصاحبه اختصاصی با قهرمان بدنسازی ایران", category: "مصاحبه", author: "GAMva Sport", authorAvatar: "https://randomuser.me/api/portraits/men/65.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 15600, likes: 4200, date: "۱۴۰۳/۱۰/۰۵", trending: true },
        { id: 5, type: "article", title: "رژیم غذایی مناسب برای ورزشکاران حرفه‌ای", category: "تغذیه", author: "دکتر سارا احمدی", authorAvatar: "https://randomuser.me/api/portraits/women/44.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 890, likes: 234, date: "۱۴۰۳/۱۰/۰۱", trending: false },
        { id: 6, type: "podcast", title: "اهمیت ریکاوری در ورزش", category: "تمرین", author: "امیرعلی سلیمی", authorAvatar: "https://randomuser.me/api/portraits/men/32.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 1890, likes: 456, date: "۱۴۰۳/۰۹/۲۸", trending: false },
        { id: 7, type: "magazine", title: "ویژه‌نامه پاییز ۱۴۰۳ - توانبخشی ورزشی", category: "تمرین", author: "تیم مجله GAMva", authorAvatar: "https://randomuser.me/api/portraits/men/75.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 4500, likes: 890, date: "۱۴۰۳/۰۹/۲۵", trending: true },
        { id: 8, type: "journal", title: "یادداشت‌های مربی: اهمیت استراحت", category: "روانشناسی", author: "نرگس تقوی", authorAvatar: "https://randomuser.me/api/portraits/women/68.jpg", image: "assets/img/skate-park-with-ramps-in-tropical-city.jpg", views: 3200, likes: 678, date: "۱۴۰۳/۰۹/۲۲", trending: false }
    ];

    let currentType = "all";
    let currentCategory = "all";
    let currentTab = "all";
    let currentView = "grid";
    let displayedCount = 6;
    const loadMoreStep = 6;

    function getTypeIcon(type) {
        const icons = {
            article: "📄",
            video: "🎬",
            podcast: "🎙️",
            magazine: "📰",
            journal: "📓"
        };
        return icons[type] || "📄";
    }

    function formatNumber(num) {
        if (num >= 10000) return (num / 1000).toFixed(0) + "K";
        if (num >= 1000) return (num / 1000).toFixed(1) + "K";
        return num.toString();
    }

    function filterContents() {
        let filtered = [...allContents];
        
        // فیلتر بر اساس نوع محتوا
        if (currentType !== "all") {
            filtered = filtered.filter(c => c.type === currentType);
        }
        
        // فیلتر بر اساس دسته‌بندی
        if (currentCategory !== "all") {
            filtered = filtered.filter(c => c.category === currentCategory);
        }
        
        // فیلتر بر اساس تب
        if (currentTab === "trending") {
            filtered = filtered.filter(c => c.trending);
        } else if (currentTab === "latest") {
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        } else if (currentTab === "following") {
            // شبیه‌سازی محتوای دنبال‌شده
            filtered = filtered.slice(0, 4);
        }
        
        return filtered;
    }

    function renderContent() {
        const filtered = filterContents();
        const displayContents = filtered.slice(0, displayedCount);
        const grid = document.getElementById('contentGrid');
        
        grid.className = `content-grid ${currentView === 'grid' ? 'grid-view' : 'list-view'}`;
        
        grid.innerHTML = displayContents.map(content => `
            <div class="content-card">
                <div class="card-media">
                    <img src="${content.image}" alt="${content.title}">
                    <span class="content-type-badge ${content.type}">${getTypeIcon(content.type)} ${content.type === 'article' ? 'مقاله' : content.type === 'video' ? 'ویدیو' : content.type === 'podcast' ? 'پادکست' : content.type === 'magazine' ? 'مجله' : 'ژورنال'}</span>
                    <div class="card-overlay">
                        <div class="quick-actions">
                            <div class="quick-action"><i class="fas fa-heart"></i></div>
                            <div class="quick-action"><i class="fas fa-bookmark"></i></div>
                            <div class="quick-action"><i class="fas fa-share-alt"></i></div>
                        </div>
                    </div>
                </div>
                <div class="card-content">
                    <h3 class="card-title">${content.title}</h3>
                    <div class="card-meta">
                        <div class="author-info">
                            <img src="${content.authorAvatar}" class="author-avatar" alt="">
                            <span>${content.author}</span>
                        </div>
                        <span>${content.date}</span>
                    </div>
                    <div class="card-stats">
                        <span><i class="fas fa-eye"></i> ${formatNumber(content.views)}</span>
                        <span><i class="fas fa-heart"></i> ${formatNumber(content.likes)}</span>
                    </div>
                </div>
            </div>
        `).join('');
        
        // رندر محبوب‌ترین‌ها در سایدبار
        const popular = [...allContents].sort((a, b) => b.views - a.views).slice(0, 3);
        document.getElementById('popularList').innerHTML = popular.map(item => `
            <div style="display: flex; gap: 12px; margin-bottom: 16px; align-items: center;">
                <img src="${item.image}" style="width: 50px; height: 50px; border-radius: 12px; object-fit: cover;">
                <div>
                    <div style="font-weight: 700; font-size: 0.85rem; margin-bottom: 4px;">${item.title.substring(0, 30)}...</div>
                    <div style="font-size: 0.7rem; color: #8ca3c0;">${formatNumber(item.views)} بازدید</div>
                </div>
            </div>
        `).join('');
        
        // مخفی کردن دکمه لود بیشتر اگر همه محتوا نمایش داده شده
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (displayedCount >= filtered.length) {
            loadMoreBtn.style.display = 'none';
        } else {
            loadMoreBtn.style.display = 'block';
        }
    }

    // رویدادهای فیلتر نوع
    document.querySelectorAll('#typeFilters .filter-option').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#typeFilters .filter-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.dataset.type;
            displayedCount = loadMoreStep;
            renderContent();
        });
    });

    // رویدادهای فیلتر دسته‌بندی
    document.querySelectorAll('#categoryFilters .filter-option').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#categoryFilters .filter-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.cat;
            displayedCount = loadMoreStep;
            renderContent();
        });
    });

    // رویدادهای تب
    document.querySelectorAll('.content-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.content-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            displayedCount = loadMoreStep;
            renderContent();
        });
    });

    // رویدادهای نما
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = btn.dataset.view;
            renderContent();
        });
    });

    // لود بیشتر
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
        displayedCount += loadMoreStep;
        renderContent();
    });

    // رندر اولیه
    renderContent();
</script>
</body>
</html>
